x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-worker-common: &worker-common
  image: ai-game-engine-worker-service
  build:
    context: .
    dockerfile: services/worker/Dockerfile
  logging: *default-logging
  restart: unless-stopped
  environment: &worker-env
    SCHEDULER_URL: http://scheduler-service:8010
    BACKEND_API_URL: http://backend-api:8000/api/v1
    INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    WORKER_LABELS: '{"region":"local","pool":"compose"}'
    GAMES_ROOT: /app/games
    EXECUTION_MODE: docker
    DOCKER_BINARY: docker
    DOCKER_IMAGE: python:3.12-slim
    DOCKER_NETWORK_MODE: none
    DOCKER_LOG_DRIVER: json-file
    DOCKER_LOG_MAX_SIZE: 10m
    DOCKER_LOG_MAX_FILE: "3"
    MAX_SLOTS: "1"
    EXECUTION_TIMEOUT_SECONDS: "20"
    ENGINE_TIMEOUT_CAP_SECONDS: "60"
    AUTO_POLL_ENABLED: "true"
    AUTO_POLL_INTERVAL_SECONDS: "2"
    AUTO_POLL_ERROR_BACKOFF_SECONDS: "3"
    REQUEST_TIMEOUT_SECONDS: "30"
    WORKER_REGISTRATION_TTL_SECONDS: "30"
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    redis:
      condition: service_healthy
    backend-api:
      condition: service_healthy
    scheduler-service:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://localhost:8020/health"]
    interval: 15s
    timeout: 5s
    retries: 20
    start_period: 20s
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "1.0"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-game-postgres-v2
    logging: *default-logging
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game-engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: ai-game-redis-v2
    logging: *default-logging
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"

  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-game-backend-v2
    logging: *default-logging
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: game-engine
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_SERVICE_URL: http://scheduler-service:8010
      BUILDER_SERVICE_URL: http://builder-service:8030
      CORE_REPOSITORY_BACKEND: sqlalchemy
      CORE_REPOSITORY_AUTO_CREATE_TABLES: "true"
      EXECUTION_REPOSITORY_BACKEND: sqlalchemy
      EXECUTION_REPOSITORY_AUTO_CREATE_TABLES: "true"
      SESSION_REPOSITORY_BACKEND: sqlalchemy
      SESSION_REPOSITORY_AUTO_CREATE_TABLES: "true"
      GAMES_ROOT: /app/games
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      BACKEND_WORKERS: "4"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/auth/options"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  scheduler-service:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    container_name: ai-game-scheduler-v2
    logging: *default-logging
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8010:8010"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  worker-service:
    <<: *worker-common
    container_name: ai-game-worker-v2
    environment:
      <<: *worker-env
      WORKER_ID: worker-compose-1
      HOSTNAME: worker-compose-1
    ports:
      - "8020:8020"

  worker-service-2:
    <<: *worker-common
    container_name: ai-game-worker-v2-2
    environment:
      <<: *worker-env
      WORKER_ID: worker-compose-2
      HOSTNAME: worker-compose-2
    ports:
      - "8021:8020"

  worker-service-3:
    <<: *worker-common
    container_name: ai-game-worker-v2-3
    environment:
      <<: *worker-env
      WORKER_ID: worker-compose-3
      HOSTNAME: worker-compose-3
    ports:
      - "8022:8020"

  worker-service-4:
    <<: *worker-common
    container_name: ai-game-worker-v2-4
    environment:
      <<: *worker-env
      WORKER_ID: worker-compose-4
      HOSTNAME: worker-compose-4
    ports:
      - "8023:8020"

  builder-service:
    build:
      context: .
      dockerfile: services/builder/Dockerfile
    container_name: ai-game-builder-v2
    logging: *default-logging
    restart: unless-stopped
    environment:
      BACKEND_API_URL: http://backend-api:8000/api/v1
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    ports:
      - "8030:8030"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8030/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-game-frontend-v2
    logging: *default-logging
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
