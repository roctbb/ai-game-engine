services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-game-postgres-v2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game-engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: ai-game-redis-v2
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-game-backend-v2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: game-engine
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_SERVICE_URL: http://scheduler-service:8010
      BUILDER_SERVICE_URL: http://builder-service:8030
      CORE_REPOSITORY_BACKEND: sqlalchemy
      CORE_REPOSITORY_AUTO_CREATE_TABLES: "true"
      EXECUTION_REPOSITORY_BACKEND: sqlalchemy
      EXECUTION_REPOSITORY_AUTO_CREATE_TABLES: "true"
      SESSION_REPOSITORY_BACKEND: sqlalchemy
      SESSION_REPOSITORY_AUTO_CREATE_TABLES: "true"
      GAMES_ROOT: /app/games
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/auth/options', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  scheduler-service:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    container_name: ai-game-scheduler-v2
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8010:8010"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  worker-service:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: ai-game-worker-v2
    environment:
      SCHEDULER_URL: http://scheduler-service:8010
      BACKEND_API_URL: http://backend-api:8000/api/v1
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      WORKER_ID: worker-compose-1
      HOSTNAME: worker-compose-1
      WORKER_LABELS: '{"region":"local","pool":"compose"}'
      GAMES_ROOT: /app/games
      EXECUTION_MODE: docker
      DOCKER_BINARY: docker
      DOCKER_IMAGE: python:3.12-slim
      DOCKER_NETWORK_MODE: none
      MAX_SLOTS: "4"
      AUTO_POLL_ENABLED: "true"
      AUTO_POLL_INTERVAL_SECONDS: "1"
      AUTO_POLL_ERROR_BACKOFF_SECONDS: "3"
      REQUEST_TIMEOUT_SECONDS: "30"
      WORKER_REGISTRATION_TTL_SECONDS: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8020:8020"
    depends_on:
      redis:
        condition: service_healthy
      backend-api:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8020/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

