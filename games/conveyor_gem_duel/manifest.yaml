id: conveyor_gem_duel_v1
title: Дуэль на конвейерах
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, score), возвращающую up/right/down/left/stay. Собирайте самоцветы на поле с конвейерами.
description: Два игрока соревнуются на случайной фабрике, где конвейеры могут быстро унести к самоцветам или от них.
difficulty: hard
learning_section: "Состояния: время, ключи, ресурсы"
topics:
  - BFS
  - симуляция
  - соревнование
slots:
  - key: orange
    title: Оранжевый игрок
    required: true
  - key: violet
    title: Фиолетовый игрок
    required: true
demo_strategies:
  - id: orange_bfs
    slot_key: orange
    title: "Демо: BFS до самоцвета"
    language: python
    path: examples/orange_bfs.py
    description: Ищет ближайший самоцвет, учитывая конвейеры.
  - id: violet_bfs
    slot_key: violet
    title: "Демо: BFS до самоцвета"
    language: python
    path: examples/violet_bfs.py
    description: Ищет ближайший самоцвет другим порядком направлений.
