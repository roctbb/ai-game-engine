id: conveyor_gem_duel_v1
title: Дуэль на конвейерах
game_mode: multiplayer
min_players_per_match: 2
max_players_per_match: 2
semver: 1.1.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, score), возвращающую
  up/right/down/left/stay. Собирайте самоцветы на поле с конвейерами.
description: Два игрока соревнуются на случайной фабрике, где конвейеры могут быстро
  унести к самоцветам или от них.
difficulty: hard
learning_section: 'Состояния: время, ключи, ресурсы'
topics:
- BFS
- симуляция
- соревнование
slots:
- key: player
  title: Игрок
  required: true
demo_strategies:
- id: demo_strategy
  slot_key: player
  title: 'Демо: базовая стратегия'
  language: python
  path: examples/demo.py
  description: Ищет ближайший самоцвет, учитывая конвейеры.
