<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Apple Market Renderer</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;width:100vw;height:100vh;display:grid;place-items:center;background:#122018;color:#eaf7ef;font-family:Arial,sans-serif;overflow:hidden}
    .wrap{width:min(96vmin,920px);padding:10px}
    svg{width:100%;aspect-ratio:1/1;background:#dff1d2;border:1px solid #2b4734;border-radius:8px;display:block;box-shadow:0 18px 46px rgba(2,6,23,.34)}
    .hud{margin-top:8px;display:grid;grid-template-columns:1.15fr repeat(4,minmax(0,1fr));gap:8px;font:13px ui-monospace,monospace;color:#dbeafe}
    .pill{min-height:38px;border:1px solid rgba(255,255,255,.16);background:rgba(15,23,42,.72);border-radius:8px;padding:6px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .pill b{color:#fff}
    .meter{height:8px;min-width:90px;flex:1;background:#334155;border-radius:99px;overflow:hidden}
    .fill{height:100%;background:linear-gradient(90deg,#22c55e,#facc15)}
  </style>
</head>
<body>
<div class="wrap">
  <svg id="board" role="img" aria-label="Apple market"></svg>
  <div id="hud" class="hud"></div>
</div>
<script>
const SVG="http://www.w3.org/2000/svg";
const boardEl=document.getElementById("board");
const hudEl=document.getElementById("hud");
const COLORS={
  north_west:"#16a34a",
  north_east:"#2563eb",
  south_west:"#c026d3",
  south_east:"#f97316"
};
const NAMES={north_west:"NW",north_east:"NE",south_west:"SW",south_east:"SE"};

function el(tag,attrs={}){const node=document.createElementNS(SVG,tag);for(const[k,v]of Object.entries(attrs))node.setAttribute(k,String(v));return node}
function add(tag,attrs){const node=el(tag,attrs);boardEl.appendChild(node);return node}
function txt(x,y,value,size,fill="#102016",weight=800,anchor="middle"){const t=add("text",{x,y,"text-anchor":anchor,"dominant-baseline":"middle","font-size":size,"font-weight":weight,fill});t.textContent=String(value);return t}
function cellCenter(x,y,C){return [x*C+C/2,y*C+C/2]}
function labelOf(frame,slot){return (frame.labels&&frame.labels[slot])||NAMES[slot]||slot}

function apple(x,y,C,scale=1,glow=false){
  const [cx,cy]=cellCenter(x,y,C);
  if(glow)add("circle",{cx,cy,r:C*.38*scale,fill:"#fb7185",opacity:.22});
  add("circle",{cx:cx-C*.055*scale,cy:cy+C*.02*scale,r:C*.16*scale,fill:"#ef4444"});
  add("circle",{cx:cx+C*.08*scale,cy:cy+C*.02*scale,r:C*.17*scale,fill:"#dc2626"});
  add("path",{d:`M ${cx-C*.01*scale} ${cy-C*.14*scale} Q ${cx+C*.2*scale} ${cy-C*.33*scale} ${cx+C*.34*scale} ${cy-C*.14*scale}`,stroke:"#15803d","stroke-width":Math.max(2,C*.045*scale),fill:"none","stroke-linecap":"round"});
}

function drawTree(tree,C,spawned){
  if(!tree)return;
  const [cx,cy]=cellCenter(tree.x,tree.y,C);
  add("rect",{x:cx-C*.16,y:cy-C*.02,width:C*.32,height:C*.48,rx:C*.08,fill:"#8b5a2b"});
  add("circle",{cx:cx-C*.22,cy:cy-C*.2,r:C*.34,fill:"#1f9d55"});
  add("circle",{cx:cx+C*.22,cy:cy-C*.18,r:C*.36,fill:"#15803d"});
  add("circle",{cx,cy:cy-C*.43,r:C*.34,fill:"#22c55e"});
  add("circle",{cx,cy:cy-C*.18,r:C*.44,fill:"#16a34a",opacity:.8});
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2+0.6;
    apple(tree.x+Math.cos(a)*.35,tree.y+Math.sin(a)*.25,C,.45,false);
  }
  txt(cx,cy+C*.62,"ЯБЛОНЯ",C*.13,"#14532d",900);
  if(spawned&&spawned.length){
    add("circle",{cx,cy,r:C*.78,fill:"none",stroke:"#facc15","stroke-width":C*.06,opacity:.85});
  }
}

function base(slot,b,C,delivered,label){
  const color=COLORS[slot]||"#64748b";
  const x=b.x*C,y=b.y*C,cx=x+C/2,cy=y+C/2;
  add("rect",{x:x+C*.06,y:y+C*.06,width:C*.88,height:C*.88,rx:C*.1,fill:"#fff7ed",stroke:color,"stroke-width":C*.07});
  add("path",{d:`M ${x+C*.16} ${y+C*.48} L ${cx} ${y+C*.18} L ${x+C*.84} ${y+C*.48} V ${y+C*.84} H ${x+C*.16} Z`,fill:"#fde68a",stroke:color,"stroke-width":C*.035});
  add("circle",{cx:x+C*.72,cy:y+C*.28,r:C*.22,fill:color,opacity:.96});
  txt(x+C*.72,y+C*.28,delivered||0,C*.24,"#fff",900);
  txt(cx,y-C*.16,label,C*.15,color,900);
  txt(cx,y+C*.88,NAMES[slot]||slot,C*.13,color,900);
}

function player(slot,p,C,carrying,delivered,frozen,label){
  const color=COLORS[slot]||"#64748b";
  const [cx,cy]=cellCenter(p.x,p.y,C);
  add("ellipse",{cx,cy:cy+C*.3,rx:C*.26,ry:C*.08,fill:"#020617",opacity:.28});
  add("rect",{x:cx-C*.2,y:cy-C*.02,width:C*.4,height:C*.38,rx:C*.09,fill:color,stroke:"#fff","stroke-width":C*.035});
  add("circle",{cx,cy:cy-C*.2,r:C*.18,fill:"#fde68a",stroke:"#7c2d12","stroke-width":C*.02});
  txt(cx,cy-C*.56,label,C*.14,color,900);
  txt(cx,cy+C*.14,NAMES[slot]||slot,C*.13,"#fff",900);
  if(carrying>0){
    for(let i=0;i<Math.min(2,carrying);i++)apple(p.x-.14+i*.28,p.y-.5,C,.42,false);
  }
  if(frozen>0){
    add("circle",{cx,cy,r:C*.43,fill:"#7dd3fc",opacity:.2,stroke:"#38bdf8","stroke-width":C*.045});
    txt(cx,cy-C*.56,frozen,C*.22,"#075985",900);
  }
  txt(cx,cy+C*.66,`+${delivered||0}`,C*.16,color,900);
}

function drawBoard(frame){
  const grid=Array.isArray(frame.board)?frame.board:[];
  const w=frame.width||grid.length||15;
  const h=frame.height||(Array.isArray(grid[0])?grid[0].length:15);
  const C=34;
  boardEl.setAttribute("viewBox",`0 0 ${w*C} ${h*C}`);
  boardEl.replaceChildren();

  add("rect",{x:0,y:0,width:w*C,height:h*C,fill:"#dff1d2"});
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const v=grid[x]?.[y]??0;
    const grass=(x+y)%2===0?"#dff1d2":"#d4eac7";
    add("rect",{x:x*C,y:y*C,width:C-1,height:C-1,fill:v===-1?"#61714f":grass,stroke:"#b9d0ad","stroke-width":.4});
    if(v===-1){
      add("path",{d:`M ${x*C+C*.18} ${y*C+C*.72} Q ${x*C+C*.42} ${y*C+C*.28} ${x*C+C*.8} ${y*C+C*.62}`,stroke:"#334155","stroke-width":C*.05,fill:"none",opacity:.42});
    }
  }

  Object.entries(frame.bases||{}).forEach(([slot,b])=>base(slot,b,C,(frame.delivered||{})[slot]||0,labelOf(frame,slot)));
  drawTree(frame.tree,C,frame.spawned_apples);

  const spawned=new Set((frame.spawned_apples||[]).map(p=>`${p.x},${p.y}`));
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const v=grid[x]?.[y]??0;
    if(v===1)apple(x,y,C,1,spawned.has(`${x},${y}`));
  }

  (frame.projectiles||[]).forEach(pr=>{
    const path=pr.path||[];
    if(path.length){
      const points=path.map(p=>`${p.x*C+C/2},${p.y*C+C/2}`).join(" ");
      add("polyline",{points,fill:"none",stroke:pr.hit?"#38bdf8":"#f97316","stroke-width":C*.09,"stroke-linecap":"round","stroke-linejoin":"round",opacity:.72});
      const last=path[path.length-1];
      apple(last.x,last.y,C,.55,true);
    }
  });

  const c=frame.carrying||{},d=frame.delivered||{},f=frame.frozen||{};
  Object.entries(frame.positions||{}).forEach(([slot,p])=>{
    if(Number.isFinite(p.x)&&Number.isFinite(p.y))player(slot,p,C,c[slot]||0,d[slot]||0,f[slot]||0,labelOf(frame,slot));
  });

  hudEl.innerHTML="";
  const limit=Number(frame.turn_limit||150),turn=Number(frame.turn||0),left=Number(frame.turns_left??Math.max(0,limit-turn));
  const percent=Math.max(0,Math.min(1,turn/Math.max(1,limit)));
  const timer=document.createElement("div");
  timer.className="pill";
  timer.innerHTML=`<span><b>${turn}/${limit}</b><br>до конца ${left}</span><span class="meter"><span class="fill" style="width:${percent*100}%"></span></span><span>яблок: ${frame.apples_left||0}<br>новые через ${frame.next_spawn_in||0}</span>`;
  hudEl.appendChild(timer);
  const scores=frame.slot_scores||{},throws=frame.throws||{};
  Object.keys(frame.positions||{}).forEach(slot=>{
    const item=document.createElement("div");
    item.className="pill";
    item.style.borderColor=COLORS[slot]||"#fff";
    item.innerHTML=`<span><b style="color:${COLORS[slot]||"#fff"}">${labelOf(frame,slot)}</b><br>база ${d[slot]||0}, несет ${c[slot]||0}</span><span>freeze ${f[slot]||0}<br>throw ${throws[slot]||0}<br>${scores[slot]??""}</span>`;
    hudEl.appendChild(item);
  });
}

window.addEventListener("message",event=>{
  const message=event.data;
  if(!message||typeof message!=="object")return;
  if(message.type==="agp.renderer.init"){
    window.parent.postMessage({type:"agp.renderer.ready",payload:{version:"apple-market-tree-spawn"}}, "*");
    return;
  }
  if(message.type==="agp.renderer.state")drawBoard(message.payload?.frame||message.frame||{});
});

drawBoard({
  width:15,
  height:15,
  board:Array.from({length:15},(_,x)=>Array.from({length:15},(_,y)=>(x===0||y===0||x===14||y===14)?-1:0)),
  tree:{x:7,y:7},
  bases:{north_west:{x:1,y:1},north_east:{x:13,y:1},south_west:{x:1,y:13},south_east:{x:13,y:13}},
  positions:{north_west:{x:1,y:1},north_east:{x:13,y:1},south_west:{x:1,y:13},south_east:{x:13,y:13}},
  carrying:{},delivered:{},frozen:{},throws:{},turn:0,turn_limit:150,turns_left:150,next_spawn_in:6,apples_left:0
});
window.parent.postMessage({type:"agp.renderer.ready",payload:{version:"apple-market-tree-spawn"}},"*");
</script>
</body>
</html>
