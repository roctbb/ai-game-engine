id: apple_market_v1
title: Яблочный рынок
game_mode: multiplayer
min_players_per_match: 2
max_players_per_match: 4
semver: 1.3.2
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, carrying), возвращающую up/down/left/right/stay или throw_up/throw_down/throw_left/throw_right. Собирайте яблоки за ограниченное число ходов, относите их на базу и замораживайте соперников бросками.
description: От 2 до 4 команд собирают яблоки на большой случайной карте. В центре стоит яблоня, рядом с ней периодически падают новые яблоки, а на базах видно число доставленных яблок.
difficulty: medium
learning_section: Соревновательные стратегии
topics:
- соревнования
- матрицы
- BFS
- ресурсы
- заморозка
slots:
- key: player
  title: Игрок
  required: true
demo_strategies:
- id: demo_strategy
  slot_key: player
  title: 'Демо: базовая стратегия'
  language: python
  path: examples/demo.py
  description: Собирает яблоки и возвращается на базу.
