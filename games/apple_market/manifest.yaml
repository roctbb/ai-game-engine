id: apple_market_v1
title: Яблочный рынок
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, carrying), возвращающую up/down/left/right/stay. Собирайте яблоки и относите их на свою базу.
description: Два участника собирают яблоки на случайной карте, но могут нести только два яблока за раз.
difficulty: medium
learning_section: Списки и цели
topics:
  - графы
  - BFS
  - соревнования
slots:
  - key: north
    title: Северный игрок
    required: true
  - key: south
    title: Южный игрок
    required: true
demo_strategies:
  - id: north_bfs
    slot_key: north
    title: "Демо: северный BFS"
    language: python
    path: examples/north_bfs.py
    description: Собирает яблоки и возвращается на базу.
  - id: south_bfs
    slot_key: south
    title: "Демо: южный BFS"
    language: python
    path: examples/south_bfs.py
    description: Собирает яблоки с другим порядком обхода.
