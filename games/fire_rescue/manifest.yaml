id: fire_rescue_v1
title: Пожарный робот
game_mode: single_task
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, water), возвращающую up/down/left/right/stay. Тушите пожары и пополняйте воду на источниках.
description: Робот тушит пожары на случайной карте со стенами. Огонь медленно разгорается, а воды хватает только на несколько пожаров, поэтому нужно планировать маршрут.
difficulty: hard
learning_section: "Состояния: время, ключи, ресурсы"
topics:
  - графы
  - BFS
  - планирование
slots:
  - key: agent
    title: Код пожарного робота
    required: true
demo_strategies:
  - id: bfs_firefighter
    slot_key: agent
    title: "Демо: пожарный через BFS"
    language: python
    path: examples/bfs_firefighter.py
    description: Идет к ближайшему пожару, а без воды ищет ближайший источник.
