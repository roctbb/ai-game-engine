id: road_star_duel_v1
title: Звезды на дороге
game_mode: multiplayer
min_players_per_match: 2
max_players_per_match: 2
semver: 1.1.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, score), возвращающую
  up/right/down/left/stay. Собирайте звезды и избегайте машин.
description: Два игрока соревнуются на дороге с движущимися машинами и случайно размещенными
  звездами.
difficulty: hard
learning_section: 'Состояния: время, ключи, ресурсы'
topics:
- BFS
- время в алгоритмах
- соревнование
slots:
- key: player
  title: Игрок
  required: true
demo_strategies:
- id: demo_strategy
  slot_key: player
  title: 'Демо: базовая стратегия'
  language: python
  path: examples/demo.py
  description: Ищет ближайшую звезду и избегает будущих позиций машин.
