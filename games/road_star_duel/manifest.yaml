id: road_star_duel_v1
title: Звезды на дороге
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, score), возвращающую up/right/down/left/stay. Собирайте звезды и избегайте машин.
description: Два игрока соревнуются на дороге с движущимися машинами и случайно размещенными звездами.
difficulty: hard
learning_section: "Состояния: время, ключи, ресурсы"
topics:
  - BFS
  - время в алгоритмах
  - соревнование
slots:
  - key: red
    title: Красный игрок
    required: true
  - key: blue
    title: Синий игрок
    required: true
demo_strategies:
  - id: red_time_bfs
    slot_key: red
    title: "Демо: BFS по времени"
    language: python
    path: examples/red_time_bfs.py
    description: Ищет ближайшую звезду и избегает будущих позиций машин.
  - id: blue_time_bfs
    slot_key: blue
    title: "Демо: BFS по времени"
    language: python
    path: examples/blue_time_bfs.py
    description: Ищет ближайшую звезду другим порядком направлений.
