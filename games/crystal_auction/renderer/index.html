<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task Board Renderer</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;width:100vw;height:100vh;display:grid;place-items:center;background:#08111f;color:#dbeafe;font-family:Arial,sans-serif;overflow:hidden}
    .wrap{width:min(94vw,920px);height:100vh;display:flex;flex-direction:column;justify-content:center;gap:8px;padding:8px}
    svg{width:100%;height:min(82vh,760px);background:#0f172a;border:1px solid #29415e;border-radius:4px;display:block}
    .hud{display:flex;gap:12px;flex-wrap:wrap;font:13px ui-monospace,SFMono-Regular,Menlo,monospace;color:#b6c7da;align-items:center;min-height:34px}
    .hud b{color:#e2e8f0;font-weight:700}.win{color:#4ade80}.fail{color:#fb7185}.muted{color:#94a3b8}
  </style>
</head>
<body>
<div class="wrap"><svg id="board" role="img" aria-label="Task board"></svg><div id="hud" class="hud"></div></div>
<script>
const VERSION="adventure-pregraph-14";
const SVG="http://www.w3.org/2000/svg", boardEl=document.getElementById("board"), hudEl=document.getElementById("hud");
let lastFrame=null;

function add(t,a){const e=el(t,a);boardEl.appendChild(e);return e}

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function payloadOf(m){return m&&typeof m==="object"&&m.payload&&typeof m.payload==="object"?m.payload:m}

function setView(W,H,C=32){boardEl.setAttribute("viewBox",`0 0 ${W*C} ${H*C}`);boardEl.replaceChildren();addDefs(C);add("rect",{x:0,y:0,width:W*C,height:H*C,fill:"#0f172a"});return C}
function addDefs(C){const d=add("defs",{});const g=el("pattern",{id:"gnd",width:C/2,height:C/2,patternUnits:"userSpaceOnUse"});g.appendChild(el("rect",{x:0,y:0,width:C/2,height:C/2,fill:"#17233a"}));g.appendChild(el("rect",{x:C*.08,y:C*.08,width:1.2,height:1.2,fill:"#22324d"}));d.appendChild(g);const p=el("pattern",{id:"grass",width:C/2,height:C/2,patternUnits:"userSpaceOnUse"});p.appendChild(el("rect",{x:0,y:0,width:C/2,height:C/2,fill:"#1f3b29"}));p.appendChild(el("circle",{cx:C*.18,cy:C*.14,r:1,fill:"#2f6b3e"}));d.appendChild(p);const w=el("pattern",{id:"wall",width:C,height:C,patternUnits:"userSpaceOnUse"});w.appendChild(el("rect",{x:0,y:0,width:C,height:C,fill:"#4a4f5c"}));w.appendChild(el("line",{x1:0,y1:C*.35,x2:C,y2:C*.35,stroke:"#3d424e","stroke-width":1}));w.appendChild(el("line",{x1:0,y1:C*.7,x2:C,y2:C*.7,stroke:"#3d424e","stroke-width":1}));w.appendChild(el("line",{x1:C*.5,y1:0,x2:C*.5,y2:C*.35,stroke:"#3d424e","stroke-width":1}));d.appendChild(w)}
function cell(x,y,C,fill="url(#gnd)",stroke="#1e3554"){add("rect",{x:x*C,y:y*C,width:C-1,height:C-1,fill,stroke,"stroke-width":.35})}
function grid(W,H,C,fill="url(#gnd)"){for(let y=0;y<H;y++)for(let x=0;x<W;x++)cell(x,y,C,fill)}
function outline(x,y,C,color="#facc15"){add("rect",{x:x*C+2,y:y*C+2,width:C-5,height:C-5,rx:4,fill:"none",stroke:color,"stroke-width":3})}
function badge(cx,cy,C,label,fill="#0f172a"){if(label===undefined||label===null||label==="")return;add("circle",{cx:cx+C*.27,cy:cy-C*.27,r:Math.max(5,C*.18),fill,stroke:"#fff","stroke-width":Math.max(1,C*.04)});textNode(cx+C*.27,cy-C*.27,String(label).slice(0,3),Math.max(8,C*.22),"#fff",800)}
function bar(cx,cy,C,value,max,fill="#22c55e"){const m=Number(max),v=Number(value);if(!Number.isFinite(m)||m<=0||!Number.isFinite(v))return;const pct=clamp(v/m,0,1),w=C*.72,h=Math.max(3,C*.08);add("rect",{x:cx-w/2,y:cy+C*.34,width:w,height:h,rx:h/2,fill:"rgba(2,6,23,.75)"});add("rect",{x:cx-w/2,y:cy+C*.34,width:w*pct,height:h,rx:h/2,fill:pct<.25?"#ef4444":fill})}
function hero(x,y,C,label=""){const cx=x*C+C/2,cy=y*C+C/2;add("ellipse",{cx,cy:C?cy+C*.18:cy,rx:C*.28,ry:C*.1,fill:"#020617",opacity:.35});add("circle",{cx,cy:cy-C*.13,r:C*.18,fill:"#fbbf24"});add("rect",{x:cx-C*.18,y:cy, width:C*.36,height:C*.34,rx:C*.06,fill:"#2563eb"});add("rect",{x:cx-C*.12,y:cy+C*.1,width:C*.24,height:C*.07,rx:C*.02,fill:"#dbeafe"});badge(cx,cy,C,label,"#2563eb")}
function archer(x,y,C,label=""){const cx=x*C+C/2,cy=y*C+C/2;add("circle",{cx,cy:cy-C*.12,r:C*.17,fill:"#fbbf24"});add("path",{d:`M ${cx-C*.2} ${cy+C*.22} L ${cx+C*.2} ${cy+C*.22} L ${cx+C*.13} ${cy-C*.02} Q ${cx} ${cy-C*.12} ${cx-C*.13} ${cy-C*.02} Z`,fill:"#16a34a"});add("path",{d:`M ${cx+C*.25} ${cy-C*.32} Q ${cx+C*.55} ${cy} ${cx+C*.25} ${cy+C*.32}`,fill:"none",stroke:"#dbeafe","stroke-width":C*.07,"stroke-linecap":"round"});add("line",{x1:cx+C*.05,y1:cy,x2:cx+C*.55,y2:cy,stroke:"#facc15","stroke-width":C*.06,"stroke-linecap":"round"});badge(cx,cy,C,label,"#166534")}
function enemy(x,y,C,label=""){const cx=x*C+C/2,cy=y*C+C/2;add("ellipse",{cx,cy:cy+C*.2,rx:C*.24,ry:C*.09,fill:"#020617",opacity:.35});add("circle",{cx,cy:cy-C*.05,r:C*.22,fill:"#7f1d1d"});add("path",{d:`M ${cx-C*.25} ${cy+C*.32} L ${cx+C*.25} ${cy+C*.32} L ${cx+C*.16} ${cy+C*.02} Q ${cx} ${cy-C*.08} ${cx-C*.16} ${cy+C*.02} Z`,fill:"#dc2626"});add("circle",{cx:cx-C*.08,cy:cy-C*.07,r:C*.025,fill:"#fff"});add("circle",{cx:cx+C*.08,cy:cy-C*.07,r:C*.025,fill:"#fff"});badge(cx,cy,C,label,"#991b1b")}
function coin(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("circle",{cx,cy,r:C*.23,fill:"#facc15",stroke:"#fef3c7","stroke-width":C*.05});textNode(cx,cy,"P",C*.32,"#92400e",900)}
function crystal(x,y,C,label=""){const cx=x*C+C/2,cy=y*C+C/2;add("path",{d:`M ${cx} ${cy-C*.32} L ${cx+C*.24} ${cy-C*.05} L ${cx} ${cy+C*.34} L ${cx-C*.24} ${cy-C*.05} Z`,fill:"#38bdf8",stroke:"#dbeafe","stroke-width":C*.035});badge(cx,cy,C,label,"#075985")}
function wallIcon(x,y,C){add("rect",{x:x*C+C*.18,y:y*C+C*.18,width:C*.64,height:C*.64,rx:C*.08,fill:"#64748b",stroke:"#cbd5e1","stroke-width":C*.04})}
function caveIcon(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("path",{d:`M ${cx-C*.35} ${cy+C*.34} Q ${cx-C*.28} ${cy-C*.34} ${cx} ${cy-C*.34} Q ${cx+C*.28} ${cy-C*.34} ${cx+C*.35} ${cy+C*.34} Z`,fill:"#64748b"});add("path",{d:`M ${cx-C*.17} ${cy+C*.34} Q ${cx-C*.12} ${cy} ${cx} ${cy} Q ${cx+C*.12} ${cy} ${cx+C*.17} ${cy+C*.34} Z`,fill:"#020617"})}
function plant(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("line",{x1:cx,y1:cy+C*.25,x2:cx,y2:cy-C*.2,stroke:"#22c55e","stroke-width":C*.08,"stroke-linecap":"round"});add("ellipse",{cx:cx-C*.1,cy:cy-C*.04,rx:C*.16,ry:C*.08,fill:"#86efac",transform:`rotate(-35 ${cx-C*.1} ${cy-C*.04})`});add("ellipse",{cx:cx+C*.12,cy:cy-C*.12,rx:C*.16,ry:C*.08,fill:"#4ade80",transform:`rotate(35 ${cx+C*.12} ${cy-C*.12})`})}
function apple(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("circle",{cx:cx-C*.06,cy,r:C*.18,fill:"#ef4444"});add("circle",{cx:cx+C*.08,cy,r:C*.18,fill:"#dc2626"});add("path",{d:`M ${cx} ${cy-C*.2} Q ${cx+C*.18} ${cy-C*.38} ${cx+C*.33} ${cy-C*.24} Q ${cx+C*.18} ${cy-C*.15} ${cx} ${cy-C*.2}`,fill:"#22c55e"})}
function robot(x,y,C,label=""){const cx=x*C+C/2,cy=y*C+C/2;add("rect",{x:cx-C*.25,y:cy-C*.18,width:C*.5,height:C*.42,rx:C*.09,fill:"#38bdf8"});add("rect",{x:cx-C*.15,y:cy-C*.33,width:C*.3,height:C*.12,rx:C*.05,fill:"#93c5fd"});add("circle",{cx:cx-C*.09,cy:cy,r:C*.04,fill:"#0f172a"});add("circle",{cx:cx+C*.09,cy:cy,r:C*.04,fill:"#0f172a"});badge(cx,cy,C,label,"#075985")}
function waterDrop(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("path",{d:`M ${cx} ${cy-C*.28} Q ${cx+C*.22} ${cy} ${cx} ${cy+C*.25} Q ${cx-C*.22} ${cy} ${cx} ${cy-C*.28}`,fill:"#38bdf8",stroke:"#bae6fd","stroke-width":C*.035})}
function baseIcon(x,y,C,label=""){const cx=x*C+C/2,cy=y*C+C/2;add("rect",{x:x*C+C*.18,y:y*C+C*.28,width:C*.64,height:C*.44,rx:C*.06,fill:"#334155",stroke:"#cbd5e1","stroke-width":C*.04});add("path",{d:`M ${x*C+C*.14} ${y*C+C*.3} L ${cx} ${y*C+C*.06} L ${x*C+C*.86} ${y*C+C*.3} Z`,fill:"#64748b",stroke:"#cbd5e1","stroke-width":C*.035});if(label)textNode(cx,y*C+C*.52,label,C*.16,"#e2e8f0",800)}
function keyIcon(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("circle",{cx:cx-C*.12,cy,r:C*.11,fill:"none",stroke:"#facc15","stroke-width":C*.06});add("line",{x1:cx-C*.01,y1:cy,x2:cx+C*.28,y2:cy,stroke:"#facc15","stroke-width":C*.06,"stroke-linecap":"round"});add("line",{x1:cx+C*.18,y1:cy,x2:cx+C*.18,y2:cy+C*.12,stroke:"#facc15","stroke-width":C*.05,"stroke-linecap":"round"})}
function potionIcon(x,y,C,fill="#fb7185"){const cx=x*C+C/2,cy=y*C+C/2;add("rect",{x:cx-C*.09,y:cy-C*.31,width:C*.18,height:C*.13,rx:C*.03,fill:"#cbd5e1"});add("path",{d:`M ${cx-C*.2} ${cy+C*.26} Q ${cx-C*.25} ${cy-C*.06} ${cx-C*.07} ${cy-C*.18} L ${cx+C*.07} ${cy-C*.18} Q ${cx+C*.25} ${cy-C*.06} ${cx+C*.2} ${cy+C*.26} Z`,fill,stroke:"#fecaca","stroke-width":C*.035})}
function torchIcon(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("rect",{x:cx-C*.05,y:cy-C*.02,width:C*.1,height:C*.34,rx:C*.03,fill:"#92400e"});add("path",{d:`M ${cx} ${cy-C*.34} Q ${cx+C*.2} ${cy-C*.1} ${cx} ${cy+C*.02} Q ${cx-C*.2} ${cy-C*.1} ${cx} ${cy-C*.34}`,fill:"#f97316"});add("path",{d:`M ${cx} ${cy-C*.27} Q ${cx+C*.1} ${cy-C*.1} ${cx} ${cy-C*.03} Q ${cx-C*.1} ${cy-C*.1} ${cx} ${cy-C*.27}`,fill:"#fde68a"})}
function shipIcon(x,y,C,ship={}){const cx=x*C+C/2,cy=y*C+C/2;add("path",{d:`M ${cx} ${cy-C*.32} L ${cx+C*.34} ${cy+C*.18} L ${cx+C*.08} ${cy+C*.32} L ${cx} ${cy+C*.22} L ${cx-C*.08} ${cy+C*.32} L ${cx-C*.34} ${cy+C*.18} Z`,fill:ship.broken?"#fb7185":"#38bdf8",stroke:"#dbeafe","stroke-width":C*.035});add("circle",{cx,cy:cy+C*.05,r:C*.08,fill:"#0f172a",opacity:.75})}
function mineIcon(x,y,C){const cx=x*C+C/2,cy=y*C+C/2;add("circle",{cx,cy,r:C*.21,fill:"#111827",stroke:"#fb7185","stroke-width":C*.04});for(let i=0;i<8;i++){const a=i*Math.PI/4;add("line",{x1:cx+Math.cos(a)*C*.16,y1:cy+Math.sin(a)*C*.16,x2:cx+Math.cos(a)*C*.31,y2:cy+Math.sin(a)*C*.31,stroke:"#fb7185","stroke-width":C*.035,"stroke-linecap":"round"})}}
function mirrorIcon(x,y,C,v){const cx=x*C+C/2,cy=y*C+C/2;cell(x,y,C,"#312e81");add("line",{x1:cx-C*.28,y1:cy+(v==="/" ? C*.28 : -C*.28),x2:cx+C*.28,y2:cy+(v==="/" ? -C*.28 : C*.28),stroke:"#e0f2fe","stroke-width":C*.09,"stroke-linecap":"round"});add("line",{x1:cx-C*.2,y1:cy+(v==="/" ? C*.2 : -C*.2),x2:cx+C*.2,y2:cy+(v==="/" ? -C*.2 : C*.2),stroke:"#38bdf8","stroke-width":C*.035,"stroke-linecap":"round"})}
function shield(cx,cy,C){add("path",{d:`M ${cx} ${cy-C*.36} Q ${cx+C*.34} ${cy-C*.2} ${cx+C*.28} ${cy+C*.22} Q ${cx} ${cy+C*.46} ${cx-C*.28} ${cy+C*.22} Q ${cx-C*.34} ${cy-C*.2} ${cx} ${cy-C*.36}`,fill:"#1d4ed8",opacity:.78,stroke:"#bfdbfe","stroke-width":C*.045})}
function actionGlyph(x,y,C,action){const cx=x*C+C/2,cy=y*C+C/2;if(action==="collect"){coin(x,y,C);return}if(action==="attack"){enemy(x,y,C);return}if(action==="turn_left"||action==="turn_right"){textNode(cx,cy,action==="turn_left"?"L":"R",C*.45,"#fde68a",900);return}if(action==="forward"){add("path",{d:`M ${cx-C*.16} ${cy+C*.18} L ${cx} ${cy-C*.2} L ${cx+C*.16} ${cy+C*.18}`,fill:"#93c5fd"});return}textNode(cx,cy,String(action||"?").slice(0,1),C*.35,"#cbd5e1",900)}
function drawBeam(board,C,startX,startY,startDx,startDy,limit=40){let x=startX,y=startY,dx=startDx,dy=startDy,seen=new Set(),last=null;const W=board.length,H=W&&Array.isArray(board[0])?board[0].length:0;while(0<=x&&x<W&&0<=y&&y<H&&!seen.has(`${x},${y},${dx},${dy}`)&&limit-->=0){seen.add(`${x},${y},${dx},${dy}`);if(last)add("line",{x1:last[0]*C+C/2,y1:last[1]*C+C/2,x2:x*C+C/2,y2:y*C+C/2,stroke:"#facc15","stroke-width":C*.08,"stroke-linecap":"round",opacity:.85});last=[x,y];const v=board[x]?.[y];if(v==="T"||v==="#")break;if(v==="/"){const ndx=-dy;dy=-dx;dx=ndx}else if(v==="\\"){const ndx=dy;dy=dx;dx=ndx}x+=dx;y+=dy}}
function setHud(frame, extra=""){const score=frame.score??0,status=frame.stage==="result"?(frame.solved?"WIN":"CHECK"):"RUN";hudEl.innerHTML=`<span><b>${frame.title||"task"}</b></span><span>scene: <b>${sceneName(frame.kind)}</b></span><span>score: <b>${score}</b></span><span class="${frame.solved?"win":frame.stage==="result"?"fail":""}">${status}</span>${extra?`<span class="muted">${extra}</span>`:""}`}
function sequence(frame){return Array.isArray(frame.actual)&&frame.actual.length?frame.actual:(Array.isArray(frame.expected)?frame.expected:[])}
function renderBeginnerCave(frame){const C=setView(8,6);grid(8,6,C,"url(#grass)");const path=[[1,3],[2,3],[3,3],[4,3],[5,3],[6,3]],actions=sequence(frame),upto=frame.stage==="result"?actions.length:clamp(Number(frame.active_index??-1)+1,0,actions.length);for(const [x,y] of path)cell(x,y,C,"#7c551d");for(let x=0;x<8;x++){if(x!==1&&x!==6)plant(x,1+(x%4),C)}caveIcon(6,3,C);add("rect",{x:6*C+C*.12,y:2*C+C*.1,width:C*1.2,height:C*2.3,fill:"#64748b",opacity:.28});let pos=0,coins=new Set([1,4]),monster=true;for(let i=0;i<upto;i++){const a=actions[i];if(a==="forward")pos=clamp(pos+1,0,path.length-1);if(a==="collect")coins.delete(pos);if(a==="attack"&&(pos===4||pos+1===4))monster=false}if(frame.stage==="result"&&frame.solved)pos=path.length-1;coins.forEach(i=>coin(path[i][0],path[i][1],C));if(monster)enemy(path[4][0],path[4][1],C);const [hx,hy]=path[pos];hero(hx,hy,C);if((frame.actual_step||frame.expected_step)==="attack")add("line",{x1:hx*C+C*.7,y1:hy*C+C*.35,x2:path[4][0]*C+C*.3,y2:path[4][1]*C+C*.35,stroke:"#facc15","stroke-width":C*.08,"stroke-linecap":"round"});setHud(frame,`step=${frame.step||0}/${frame.steps_total||0} expected=${norm(frame.expected_step??"")}`)}
