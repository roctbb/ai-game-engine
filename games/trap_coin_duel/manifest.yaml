id: trap_coin_duel_v1
title: Монеты и ловушки
game_mode: multiplayer
min_players_per_match: 2
max_players_per_match: 2
semver: 1.2.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board), возвращающую up/down/left/right/stay.
  Собирайте монеты и обходите движущиеся ловушки.
description: Два участника собирают монеты на случайной карте со стенами и видимыми
  движущимися ловушками.
difficulty: medium
learning_section: Соревновательные стратегии
topics:
- графы
- BFS
- игровые стратегии
slots:
- key: player
  title: Игрок
  required: true
demo_strategies:
- id: demo_strategy
  slot_key: player
  title: 'Демо: базовая стратегия'
  language: python
  path: examples/demo.py
  description: Идет к ближайшей монете, избегая стен, текущих ловушек, будущих
    клеток ловушек и соперника.
