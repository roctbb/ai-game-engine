id: maze_escape_v1
title: Выход из лабиринта
game_mode: single_task
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, maze), возвращающую up/down/left/right, и доведите агента до выхода на большой случайной карте.
description: "Проходите по лабиринту на карте 21×21: коридоры узкие, но есть несколько путей к выходу. Выход выбирается случайно в дальнюю точку, а больше очков даёт более быстрое прохождение."
difficulty: medium
learning_section: Поиск пути BFS
topics:
  - графы
  - поиск пути
slots:
  - key: agent
    title: Код агента
    required: true
demo_strategies:
  - id: wall_follower
    slot_key: agent
    title: "Демо: движение вдоль стены"
    language: python
    path: examples/agent_wall_follower.py
    description: Простая стратегия держится правой стены и выбирает первый доступный поворот.
  - id: pathfinder
    slot_key: agent
    title: "Демо: умный поиск BFS"
    language: python
    path: examples/agent_pathfinder.py
    description: На каждом шаге строит кратчайший путь до выхода по числовой карте лабиринта.
