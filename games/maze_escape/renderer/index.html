<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maze Escape Renderer</title>
  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #07101c;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1f2e46;
      overflow: hidden;
    }
    .wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
    }
    .board {
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      background: #eef4ff;
      border: 0;
      border-radius: 0;
      overflow: hidden;
    }
    .status,
    .details { display: none; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg id="board" class="board" viewBox="0 0 350 350" role="img" aria-label="Maze board"></svg>
    <div class="status" id="status">Renderer: initializing</div>
    <div class="details mono" id="details"></div>
  </div>
  <script>
    const CELL = 50;
    const DEFAULT_GRID_W = 7;
    const DEFAULT_GRID_H = 7;
    const DEFAULT_WALLS = new Set(["1,1", "1,2", "3,3", "4,3", "5,3", "2,5"]);
    const DEFAULT_EXIT = { x: 6, y: 6 };

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");

    let runId = "";

    function setStatus(text, details) {
      statusEl.textContent = text;
      detailsEl.textContent = details || "";
    }

    function cellRect(x, y, fill) {
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", String(x * CELL));
      rect.setAttribute("y", String(y * CELL));
      rect.setAttribute("width", String(CELL));
      rect.setAttribute("height", String(CELL));
      rect.setAttribute("fill", fill);
      rect.setAttribute("stroke", "#d9e4f7");
      rect.setAttribute("stroke-width", "1");
      return rect;
    }

    function circle(cx, cy, r, fill) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      el.setAttribute("cx", String(cx));
      el.setAttribute("cy", String(cy));
      el.setAttribute("r", String(r));
      el.setAttribute("fill", fill);
      return el;
    }

    function resolveMaze(frame) {
      const size = frame && typeof frame.size === "object" ? frame.size : {};
      const width = Number.isFinite(size.width) ? size.width : DEFAULT_GRID_W;
      const height = Number.isFinite(size.height) ? size.height : DEFAULT_GRID_H;
      const exit = frame && typeof frame.exit === "object" ? frame.exit : DEFAULT_EXIT;
      const walls = new Set();
      if (Array.isArray(frame?.walls)) {
        for (const wall of frame.walls) {
          if (!wall || typeof wall !== "object") continue;
          if (Number.isFinite(wall.x) && Number.isFinite(wall.y)) {
            walls.add(`${wall.x},${wall.y}`);
          }
        }
      } else {
        for (const wall of DEFAULT_WALLS) walls.add(wall);
      }
      return {
        width,
        height,
        exit: {
          x: Number.isFinite(exit.x) ? exit.x : DEFAULT_EXIT.x,
          y: Number.isFinite(exit.y) ? exit.y : DEFAULT_EXIT.y,
        },
        walls,
      };
    }

    function draw(frame) {
      const maze = resolveMaze(frame || {});
      boardEl.setAttribute("viewBox", `0 0 ${maze.width * CELL} ${maze.height * CELL}`);
      boardEl.replaceChildren();
      for (let y = 0; y < maze.height; y += 1) {
        for (let x = 0; x < maze.width; x += 1) {
          const key = `${x},${y}`;
          const fill = maze.walls.has(key) ? "#475e84" : "#f8fbff";
          boardEl.appendChild(cellRect(x, y, fill));
        }
      }

      boardEl.appendChild(cellRect(maze.exit.x, maze.exit.y, "#d9f8e7"));

      const pos = frame && frame.position && typeof frame.position === "object" ? frame.position : { x: 0, y: 0 };
      const px = Number.isFinite(pos.x) ? pos.x : 0;
      const py = Number.isFinite(pos.y) ? pos.y : 0;
      boardEl.appendChild(circle(px * CELL + CELL / 2, py * CELL + CELL / 2, 16, "#2563eb"));

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", "12");
      text.setAttribute("y", "20");
      text.setAttribute("fill", "#1f2e46");
      text.setAttribute("font-size", "13");
      const score = frame && Number.isFinite(frame.score) ? frame.score : "-";
      const reached = frame && frame.reached_exit === true ? "yes" : "no";
      text.textContent = `score=${score} reached_exit=${reached}`;
      boardEl.appendChild(text);
    }

    function onState(payload) {
      const tick = Number.isFinite(payload?.tick) ? payload.tick : "-";
      const phase = typeof payload?.phase === "string" ? payload.phase : "unknown";
      const frame = payload && typeof payload.frame === "object" ? payload.frame : {};
      draw(frame);
      setStatus(`Renderer: state update (${phase})`, `run_id=${runId || "-"} tick=${tick}`);
    }

    function onResult(payload) {
      const status = typeof payload?.status === "string" ? payload.status : "finished";
      const metrics = payload && typeof payload.metrics === "object" ? payload.metrics : {};
      const score = Number.isFinite(metrics.score) ? metrics.score : "-";
      setStatus("Renderer: result received", `run_id=${runId || "-"} status=${status} score=${score}`);
    }

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object" || typeof message.type !== "string") return;
      if (message.type === "agp.renderer.init") {
        runId = message.payload && message.payload.runId ? String(message.payload.runId) : "";
        setStatus("Renderer: init received", runId ? `run_id=${runId}` : "");
      } else if (message.type === "agp.renderer.state") {
        onState(message.payload || {});
      } else if (message.type === "agp.renderer.result") {
        onResult(message.payload || {});
      }
    });

    draw({ position: { x: 0, y: 0 }, reached_exit: false });
    window.parent.postMessage({ type: "agp.renderer.ready", payload: { version: "1.1.0" } }, "*");
    setStatus("Renderer: ready");
  </script>
</body>
</html>
