<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maze Escape Renderer</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;width:100vw;height:100vh;display:grid;place-items:center;background:#0a0e17;font-family:"Segoe UI",Arial,sans-serif;color:#c8d6e5;overflow:hidden}
    .wrap{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:6px}
    .board{flex:1 1 auto;max-width:100%;max-height:calc(100vh - 40px);aspect-ratio:1/1;border-radius:4px;overflow:hidden}
    .hud{display:flex;gap:12px;font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#94a3b8;flex-shrink:0}
    .hud b{color:#e2e8f0;font-weight:600}
    .hud .win{color:#4ade80}
  </style>
</head>
<body>
<div class="wrap">
  <svg id="board" class="board" role="img" aria-label="Maze board"></svg>
  <div class="hud" id="hud"></div>
</div>
<script>
const SVG="http://www.w3.org/2000/svg";
const boardEl=document.getElementById("board");
const hudEl=document.getElementById("hud");
let runId="",lastFrame=null,prevSteps=-1;

/* ── SVG helpers ── */
function el(tag,attrs){const e=document.createElementNS(SVG,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,String(v));return e}
function rect(x,y,w,h,fill,extra){return el("rect",{x,y,width:w,height:h,fill,...(extra||{})})}
function circle(cx,cy,r,fill,extra){return el("circle",{cx,cy,r:Math.max(0,r),fill,...(extra||{})})}

/* ── Defs ── */
function addDefs(C){
  const d=el("defs",{});

  // ground
  const gp=el("pattern",{id:"gnd",width:C/2,height:C/2,patternUnits:"userSpaceOnUse"});
  gp.appendChild(rect(0,0,C/2,C/2,"#3b4a2e"));
  gp.appendChild(rect(C*0.06,C*0.08,1.5,1.5,"#4a5c38"));
  gp.appendChild(rect(C*0.32,C*0.38,1,1,"#344226"));
  d.appendChild(gp);

  // wall
  const wp=el("pattern",{id:"wll",width:C,height:C,patternUnits:"userSpaceOnUse"});
  wp.appendChild(rect(0,0,C,C,"#4a4f5c"));
  // brick lines
  wp.appendChild(el("line",{x1:0,y1:C*0.33,x2:C,y2:C*0.33,stroke:"#3d424e","stroke-width":0.8}));
  wp.appendChild(el("line",{x1:0,y1:C*0.66,x2:C,y2:C*0.66,stroke:"#3d424e","stroke-width":0.8}));
  wp.appendChild(el("line",{x1:C*0.5,y1:0,x2:C*0.5,y2:C*0.33,stroke:"#3d424e","stroke-width":0.8}));
  wp.appendChild(el("line",{x1:0,y1:C*0.33,x2:0,y2:C*0.66,stroke:"#3d424e","stroke-width":0.8}));
  wp.appendChild(el("line",{x1:C*0.5,y1:C*0.66,x2:C*0.5,y2:C,stroke:"#3d424e","stroke-width":0.8}));
  // highlight
  wp.appendChild(rect(1,1,C*0.48,C*0.31,"#545a68",{opacity:0.25,rx:1}));
  d.appendChild(wp);

  // exit glow
  const eg=el("radialGradient",{id:"exG",cx:"50%",cy:"50%",r:"60%"});
  eg.appendChild(el("stop",{offset:"0%","stop-color":"#4ade80","stop-opacity":0.9}));
  eg.appendChild(el("stop",{offset:"100%","stop-color":"#166534","stop-opacity":0.3}));
  d.appendChild(eg);

  // torch radial
  const tg=el("radialGradient",{id:"torch",cx:"50%",cy:"50%",r:"50%"});
  tg.appendChild(el("stop",{offset:"0%","stop-color":"#fbbf24","stop-opacity":0.22}));
  tg.appendChild(el("stop",{offset:"60%","stop-color":"#f97316","stop-opacity":0.08}));
  tg.appendChild(el("stop",{offset:"100%","stop-color":"#000","stop-opacity":0}));
  d.appendChild(tg);

  // fog overlay
  const fg=el("radialGradient",{id:"fog",cx:"50%",cy:"50%",r:"50%"});
  fg.appendChild(el("stop",{offset:"0%","stop-color":"#000","stop-opacity":0}));
  fg.appendChild(el("stop",{offset:"55%","stop-color":"#000","stop-opacity":0}));
  fg.appendChild(el("stop",{offset:"85%","stop-color":"#0a0e17","stop-opacity":0.7}));
  fg.appendChild(el("stop",{offset:"100%","stop-color":"#0a0e17","stop-opacity":0.92}));
  d.appendChild(fg);

  boardEl.appendChild(d);
}

/* ── Hero sprite ── */
function drawHero(cx,cy,C,dir,tick,moving){
  const g=el("g",{transform:`translate(${cx} ${cy})`});
  const angles={right:0,down:90,left:180,up:-90};
  const a=angles[dir]||0;
  const bob=moving?Math.sin(tick*0.7)*C*0.04:0;

  const body=el("g",{transform:`rotate(${a}) translate(0 ${bob})`});

  const bw=C*0.28,bh=C*0.34;
  // shadow
  body.appendChild(el("ellipse",{cx:0,cy:bh*0.4,rx:C*0.22,ry:C*0.08,fill:"#000",opacity:0.3}));
  // torso
  body.appendChild(rect(-bw/2,-bh*0.1,bw,bh,"#2563eb",{rx:2,ry:2}));
  // belt
  body.appendChild(rect(-bw/2+1,bh*0.55,bw-2,bh*0.12,"#1e40af",{rx:1}));
  // head
  const hr=C*0.11;
  body.appendChild(circle(0,-bh*0.42,hr,"#f5d0a9"));
  // eyes
  body.appendChild(circle(-hr*0.3,-bh*0.45,C*0.022,"#1e293b"));
  body.appendChild(circle(hr*0.3,-bh*0.45,C*0.022,"#1e293b"));

  // torch stick
  const sx=bw*0.45,sy=-bh*0.35;
  body.appendChild(rect(sx,sy,C*0.05,C*0.2,"#78350f",{rx:1,transform:"rotate(20)"}));
  // flame
  const flame=circle(sx+C*0.06,sy-C*0.04,C*0.065,"#fb923c",{opacity:0.95});
  const fa=el("animate",{attributeName:"r",values:`${C*0.05};${C*0.08};${C*0.05}`,dur:"0.6s",repeatCount:"indefinite"});
  flame.appendChild(fa);
  const fc=el("animate",{attributeName:"fill",values:"#fb923c;#facc15;#f97316;#fb923c",dur:"0.7s",repeatCount:"indefinite"});
  flame.appendChild(fc);
  body.appendChild(flame);
  // flame tip
  body.appendChild(circle(sx+C*0.06,sy-C*0.09,C*0.035,"#fde68a",{opacity:0.6}));

  g.appendChild(body);
  return g;
}

/* ── Main draw ── */
function draw(frame){
  if(!frame)return;
  const sz=frame.size||{};
  const grid=Array.isArray(frame.maze)?frame.maze:[];
  const W=sz.width||(Array.isArray(grid[0])?grid[0].length:31),H=sz.height||grid.length||31;
  const walls=new Set();
  if(Array.isArray(frame.walls))for(const w of frame.walls)if(w&&Number.isFinite(w.x))walls.add(w.x+","+w.y);
  if(!walls.size&&grid.length)for(let y=0;y<grid.length;y++)if(Array.isArray(grid[y]))for(let x=0;x<grid[y].length;x++)if(grid[x]?.[y]===-1)walls.add(x+","+y);

  const C=Math.max(8,Math.floor(Math.min(window.innerWidth*0.92,window.innerHeight-44)/Math.max(W,H)));
  const pw=W*C,ph=H*C;
  boardEl.setAttribute("viewBox",`0 0 ${pw} ${ph}`);
  boardEl.replaceChildren();
  addDefs(C);

  // background
  boardEl.appendChild(rect(0,0,pw,ph,"#2d3a28"));

  // cells
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const isW=walls.has(x+","+y);
    boardEl.appendChild(rect(x*C,y*C,C,C,isW?"url(#wll)":"url(#gnd)"));
  }

  // wall top edges (3d effect)
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    if(!walls.has(x+","+y))continue;
    if(y>0&&!walls.has(x+","+(y-1))){
      boardEl.appendChild(rect(x*C,y*C,C,2,"#6b7280",{opacity:0.5}));
    }
  }

  // exit
  const ex=(frame.exit||{}).x||0,ey=(frame.exit||{}).y||0;
  boardEl.appendChild(rect(ex*C,ey*C,C,C,"url(#exG)"));
  // exit icon — door arch
  const doorW=C*0.5,doorH=C*0.65;
  const doorX=ex*C+(C-doorW)/2,doorY=ey*C+(C-doorH)*0.8;
  boardEl.appendChild(rect(doorX,doorY,doorW,doorH,"#166534",{rx:doorW/2+" "+doorW/2+" 0 0",opacity:0.7}));
  boardEl.appendChild(rect(doorX+2,doorY+2,doorW-4,doorH-2,"#22c55e",{rx:(doorW-4)/2+" "+(doorW-4)/2+" 0 0",opacity:0.4}));

  // player
  const pos=frame.position||{x:1,y:1};
  const px=pos.x||0,py=pos.y||0;
  const hx=px*C+C/2,hy=py*C+C/2;
  const steps=Number.isFinite(frame.steps)?frame.steps:0;
  const moving=prevSteps>=0&&steps>prevSteps;
  prevSteps=steps;

  // torch glow
  boardEl.appendChild(el("ellipse",{cx:hx,cy:hy,rx:C*2.5,ry:C*2.5,fill:"url(#torch)",opacity:0.8}));

  // hero
  const dir=frame.direction||"right";
  const tick=Number.isFinite(frame.steps)?frame.steps:0;
  boardEl.appendChild(drawHero(hx,hy,C,dir,tick,moving));

  // fog of war — centered on player
  const fogR=Math.max(pw,ph);
  const fogRect=rect(0,0,pw,ph,"url(#fog)");
  // We need to reposition the fog gradient center to the player
  // Use a mask approach: dark overlay with a transparent hole at player
  const mask=el("mask",{id:"fogM"});
  mask.appendChild(rect(0,0,pw,ph,"white"));
  mask.appendChild(circle(hx,hy,C*4.5,"black"));
  boardEl.appendChild(mask);
  const overlay=rect(0,0,pw,ph,"#0a0e17",{opacity:0.75,mask:"url(#fogM)"});
  boardEl.appendChild(overlay);

  // HUD
  const reached=frame.reached_exit===true;
  const sc=Number.isFinite(frame.score)?frame.score:null;
  const over=Number.isFinite(frame.steps_over_optimal)?frame.steps_over_optimal:null;
  const opt=Number.isFinite(frame.optimal_steps)?frame.optimal_steps:null;
  let html=`<span>steps: <b>${steps}</b></span>`;
  if(opt!==null)html+=`<span>optimal: <b>${opt}</b></span>`;
  if(over!==null)html+=`<span>overhead: <b>${over}</b></span>`;
  if(sc!==null)html+=`<span>score: <b>${sc}</b></span>`;
  if(reached)html+=`<span class="win">✓ EXIT</span>`;
  if(frame.invalid_moves)html+=`<span>invalid: <b>${frame.invalid_moves}</b></span>`;
  hudEl.innerHTML=html;
}

/* ── Message protocol ── */
window.addEventListener("message",e=>{
  const m=e.data;
  if(!m||typeof m!=="object"||typeof m.type!=="string")return;
  if(m.type==="agp.renderer.init"){
    runId=m.payload?.runId||"";prevSteps=-1;
  }else if(m.type==="agp.renderer.state"){
    lastFrame=m.payload||{};
    draw((lastFrame&&typeof lastFrame.frame==="object")?lastFrame.frame:{});
  }else if(m.type==="agp.renderer.result"){
    /* keep last drawn frame */
  }
});

window.addEventListener("resize",()=>{if(lastFrame)draw(typeof lastFrame.frame==="object"?lastFrame.frame:{})});

draw({position:{x:1,y:1},size:{width:31,height:31},walls:[],exit:{x:29,y:29},direction:"right",steps:0});
window.parent.postMessage({type:"agp.renderer.ready",payload:{version:"2.0.0"}},"*");
</script>
</body>
</html>
