<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minesweeper Renderer</title>
  <style>
    body{margin:0;width:100vw;height:100vh;display:grid;place-items:center;background:#101820;color:#e5edf5;font-family:Arial,sans-serif}
    .wrap{width:min(92vmin,760px)}
    svg{width:100%;aspect-ratio:1/1;background:#17212b;border:1px solid #31465a}
    .hud{margin-top:8px;font:13px ui-monospace,monospace;color:#b7c8d8}
  </style>
</head>
<body>
<div class="wrap"><svg id="board"></svg><div class="hud" id="hud"></div></div>
<script>
const SVG="http://www.w3.org/2000/svg", boardEl=document.getElementById("board"), hudEl=document.getElementById("hud");
function el(t,a){const e=document.createElementNS(SVG,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));return e}
function draw(frame){
  const grid=Array.isArray(frame.board)?frame.board:[], w=grid.length||12, h=Array.isArray(grid[0])?grid[0].length:12, C=40;
  const numberColors=["#94a3b8","#2563eb","#16a34a","#dc2626","#7c3aed","#be123c","#0891b2","#111827","#475569"];
  boardEl.setAttribute("viewBox",`0 0 ${w*C} ${h*C}`); boardEl.replaceChildren();
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const v=grid[x]?.[y]??-2, fill=v===-2?"#334155":v===-1?"#7f1d1d":v===9?"#dc2626":"#d8e2ec";
    boardEl.appendChild(el("rect",{x:x*C,y:y*C,width:C-2,height:C-2,fill}));
    if(v>=0&&v!==9){const text=el("text",{x:x*C+C/2,y:y*C+C*0.64,"text-anchor":"middle","font-size":18,"font-weight":700,fill:numberColors[v]||"#0f172a"});text.textContent=v===0?"":String(v);boardEl.appendChild(text)}
    if(v===-1){const text=el("text",{x:x*C+C/2,y:y*C+C*0.66,"text-anchor":"middle","font-size":20,fill:"#fee2e2"});text.textContent="F";boardEl.appendChild(text)}
    if(v===9){const text=el("text",{x:x*C+C/2,y:y*C+C*0.66,"text-anchor":"middle","font-size":20,fill:"#fff"});text.textContent="*";boardEl.appendChild(text)}
  }
  const status=frame.won?"WIN":frame.hit_mine?"BOOM":frame.score!==undefined?"FINISHED":"RUNNING";
  hudEl.textContent=`${status} opened=${frame.opened||0} flags_left=${frame.flags_left??"-"} invalid=${frame.invalid_moves||0} score=${frame.score??"-"}`;
}
window.addEventListener("message",e=>{const m=e.data;if(!m||typeof m!=="object")return;if(m.type==="agp.renderer.state")draw(m.payload?.frame||{});});
draw({board:Array.from({length:12},()=>Array(12).fill(-2)),opened:0,flags_left:18});
window.parent.postMessage({type:"agp.renderer.ready",payload:{version:"1.0.0"}},"*");
</script>
</body>
</html>
