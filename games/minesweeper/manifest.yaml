id: minesweeper_v1
title: Классический сапер
game_mode: single_task
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию choose_cell(board, flags_left), возвращающую (x, y) для открытия клетки или ("flag", x, y) для флага.
description: Открывайте клетки на большом поле сапера 12×12, используйте числа вокруг открытых клеток и отмечайте мины флагами. Поля подбираются без необходимости угадывать.
difficulty: hard
topics:
  - логика
slots:
  - key: agent
    title: Код сапера
    required: true
demo_strategies:
  - id: basic_solver
    slot_key: agent
    title: "Демо: простые правила"
    language: python
    path: examples/basic_solver.py
    description: Использует два базовых правила сапера и иначе открывает первую неизвестную клетку.
