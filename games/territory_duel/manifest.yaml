id: territory_duel_v1
title: Дуэль за территорию
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board), возвращающую up/down/left/right/stay. Закрашивайте как можно больше клеток своим цветом.
description: Два участника двигаются по случайной карте со стенами и захватывают клетки. Побеждает тот, у кого больше территории.
difficulty: medium
learning_section: Жадные стратегии
topics:
  - игровые стратегии
  - матрицы
  - одновременные ходы
slots:
  - key: green
    title: Зеленый игрок
    required: true
  - key: purple
    title: Фиолетовый игрок
    required: true
demo_strategies:
  - id: greedy_green
    slot_key: green
    title: "Демо: зеленый захватчик"
    language: python
    path: examples/greedy_green.py
    description: Ищет ближайшую свободную клетку через BFS.
  - id: greedy_purple
    slot_key: purple
    title: "Демо: фиолетовый захватчик"
    language: python
    path: examples/greedy_purple.py
    description: Ищет ближайшую свободную клетку, но обходит соседей в другом порядке.
