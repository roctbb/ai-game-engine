id: tag_arena_v1
title: Охотник и беглец
game_mode: small_match
semver: 1.2.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Заполните код для роли runner (беглец) и hunter (охотник). Определите make_move(x, y, board), возвращающую up/down/left/right/stay.
description: 'Асимметричная игра на случайной карте: беглец собирает звезды, а охотник идет к нему.'
difficulty: medium
learning_section: Соревновательные стратегии
topics:
  - графы
  - BFS
  - разные роли
slots:
  - key: runner
    title: Беглец
    required: true
  - key: hunter
    title: Охотник
    required: true
demo_strategies:
  - id: runner_bfs
    slot_key: runner
    title: "Демо: беглец к звезде"
    language: python
    path: examples/runner_bfs.py
    description: Идет к ближайшей звезде и избегает клетки охотника.
  - id: hunter_bfs
    slot_key: hunter
    title: "Демо: охотник к беглецу"
    language: python
    path: examples/hunter_bfs.py
    description: Идет к беглецу кратчайшим путем.
