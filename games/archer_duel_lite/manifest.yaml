id: archer_duel_lite_v1
title: Дуэль лучников Lite
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: "Определите функцию make_move(state), которая возвращает aim/shoot/shield/reload."
description: "Два лучника соревнуются, выбирая выстрел, щит, прицеливание или перезарядку."
difficulty: medium
learning_section: Соревновательные стратегии
