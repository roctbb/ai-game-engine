<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coins Right Down Renderer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f8ff;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #223451;
    }
    .wrap { width: min(620px, 96vw); }
    .board {
      background: #fff;
      border: 1px solid #c5d3ea;
      border-radius: 12px;
      overflow: hidden;
    }
    .status { margin-top: 10px; font-size: 13px; color: #3b506f; }
    .details { margin-top: 4px; font-size: 12px; color: #607796; min-height: 16px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg id="board" class="board" viewBox="0 0 360 360" role="img" aria-label="Coins board"></svg>
    <div class="status" id="status">Renderer: initializing</div>
    <div class="details mono" id="details"></div>
  </div>
  <script>
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");

    let runId = "";

    function setStatus(text, details) {
      statusEl.textContent = text;
      detailsEl.textContent = details || "";
    }

    function svg(tag) {
      return document.createElementNS("http://www.w3.org/2000/svg", tag);
    }

    function draw(frame) {
      boardEl.replaceChildren();

      const pos = frame && typeof frame.position === "object" ? frame.position : { x: 0, y: 0 };
      const size = frame && typeof frame.size === "object" ? frame.size : { width: 8, height: 8 };
      const grid = Array.isArray(frame?.board) ? frame.board : [];
      const width = Number.isFinite(size.width) ? size.width : (Array.isArray(grid[0]) ? grid[0].length : 8);
      const height = Number.isFinite(size.height) ? size.height : grid.length || 8;
      const cellSize = Math.floor(360 / Math.max(width, height));
      const goal = frame && typeof frame.goal === "object" ? frame.goal : { x: width - 1, y: height - 1 };
      const px = Number.isFinite(pos.x) ? pos.x : 0;
      const py = Number.isFinite(pos.y) ? pos.y : 0;
      const collected = Number.isFinite(frame?.coins_collected) ? frame.coins_collected : 0;
      const left = Number.isFinite(frame?.coins_left) ? frame.coins_left : 0;
      const reached = frame?.reached_goal === true;

      boardEl.setAttribute("viewBox", `0 0 ${width * cellSize} ${height * cellSize}`);

      const rect = svg("rect");
      rect.setAttribute("x", "0");
      rect.setAttribute("y", "0");
      rect.setAttribute("width", String(width * cellSize));
      rect.setAttribute("height", String(height * cellSize));
      rect.setAttribute("fill", "#f8fbff");
      boardEl.appendChild(rect);

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const value = Array.isArray(grid[y]) ? grid[y][x] : 0;
          const cell = svg("rect");
          cell.setAttribute("x", String(x * cellSize));
          cell.setAttribute("y", String(y * cellSize));
          cell.setAttribute("width", String(cellSize));
          cell.setAttribute("height", String(cellSize));
          cell.setAttribute("fill", value === -1 ? "#334155" : (x === goal.x && y === goal.y ? "#dcfce7" : "transparent"));
          cell.setAttribute("stroke", "#d9e4f7");
          cell.setAttribute("stroke-width", "1");
          boardEl.appendChild(cell);

          if (value === 1) {
            const coin = svg("circle");
            coin.setAttribute("cx", String(x * cellSize + cellSize / 2));
            coin.setAttribute("cy", String(y * cellSize + cellSize / 2));
            coin.setAttribute("r", String(Math.max(5, cellSize * 0.18)));
            coin.setAttribute("fill", "#f59e0b");
            boardEl.appendChild(coin);
          }
        }
      }

      const player = svg("circle");
      player.setAttribute("cx", String(px * cellSize + cellSize / 2));
      player.setAttribute("cy", String(py * cellSize + cellSize / 2));
      player.setAttribute("r", String(Math.max(8, cellSize * 0.24)));
      player.setAttribute("fill", "#2563eb");
      boardEl.appendChild(player);

      const text = svg("text");
      text.setAttribute("x", "10");
      text.setAttribute("y", "20");
      text.setAttribute("font-size", "13");
      text.setAttribute("fill", "#223451");
      text.textContent = `coins=${collected} left=${left} reached_goal=${reached ? "yes" : "no"}`;
      boardEl.appendChild(text);
    }

    function onState(payload) {
      const tick = Number.isFinite(payload?.tick) ? payload.tick : "-";
      const phase = typeof payload?.phase === "string" ? payload.phase : "unknown";
      const frame = payload && typeof payload.frame === "object" ? payload.frame : {};
      draw(frame);
      setStatus(`Renderer: state update (${phase})`, `run_id=${runId || "-"} tick=${tick}`);
    }

    function onResult(payload) {
      const status = typeof payload?.status === "string" ? payload.status : "finished";
      const metrics = payload && typeof payload.metrics === "object" ? payload.metrics : {};
      const score = Number.isFinite(metrics.score) ? metrics.score : "-";
      setStatus("Renderer: result received", `run_id=${runId || "-"} status=${status} score=${score}`);
    }

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object" || typeof message.type !== "string") return;
      if (message.type === "agp.renderer.init") {
        runId = message.payload && message.payload.runId ? String(message.payload.runId) : "";
        setStatus("Renderer: init received", runId ? `run_id=${runId}` : "");
      } else if (message.type === "agp.renderer.state") {
        onState(message.payload || {});
      } else if (message.type === "agp.renderer.result") {
        onResult(message.payload || {});
      }
    });

    draw({ position: { x: 0, y: 0 }, coins_collected: 0, reached_goal: false });
    window.parent.postMessage({ type: "agp.renderer.ready", payload: { version: "1.1.0" } }, "*");
    setStatus("Renderer: ready");
  </script>
</body>
</html>
