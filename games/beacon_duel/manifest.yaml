id: beacon_duel_v1
title: Дуэль маяков
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board), возвращающую up/down/left/right/stay. Активируйте маяки быстрее соперника.
description: Два участника активируют случайные маяки на общей карте со стенами.
difficulty: medium
learning_section: Соревновательные стратегии
topics:
  - графы
  - BFS
  - соревнования
slots:
  - key: white
    title: Белый игрок
    required: true
  - key: black
    title: Черный игрок
    required: true
demo_strategies:
  - id: white_bfs
    slot_key: white
    title: "Демо: белый BFS"
    language: python
    path: examples/white_bfs.py
    description: Идет к ближайшему маяку.
  - id: black_bfs
    slot_key: black
    title: "Демо: черный BFS"
    language: python
    path: examples/black_bfs.py
    description: Идет к ближайшему маяку с другим порядком обхода.
