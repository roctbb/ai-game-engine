<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake Renderer</title>
  <style>
    body{margin:0;width:100vw;height:100vh;display:grid;place-items:center;background:#08111f;color:#dbeafe;font-family:Arial,sans-serif}
    .wrap{width:min(92vmin,760px)}
    svg{width:100%;aspect-ratio:1/1;background:#0f172a;border:1px solid #29415e}
    .hud{margin-top:8px;font:13px ui-monospace,monospace;color:#b6c7da}
  </style>
</head>
<body>
<div class="wrap"><svg id="board"></svg><div id="hud" class="hud"></div></div>
<script>
const SVG="http://www.w3.org/2000/svg", boardEl=document.getElementById("board"), hudEl=document.getElementById("hud");
function el(t,a){const e=document.createElementNS(SVG,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));return e}
function draw(frame){
  const grid=Array.isArray(frame.board)?frame.board:[], h=grid.length||12, w=Array.isArray(grid[0])?grid[0].length:12, C=32;
  boardEl.setAttribute("viewBox",`0 0 ${w*C} ${h*C}`); boardEl.replaceChildren();
  boardEl.appendChild(el("rect",{x:0,y:0,width:w*C,height:h*C,fill:"#0f172a"}));
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    boardEl.appendChild(el("rect",{x:x*C,y:y*C,width:C-1,height:C-1,fill:"#17233a"}));
    const v=grid[y]?.[x]??0;
    if(v===-1)boardEl.appendChild(el("rect",{x:x*C+4,y:y*C+4,width:C-8,height:C-8,rx:5,fill:"#22c55e"}));
    if(v===1)boardEl.appendChild(el("circle",{cx:x*C+C/2,cy:y*C+C/2,r:C*0.28,fill:"#ef4444"}));
  }
  const head=frame.head||{};
  if(Number.isFinite(head.x)&&Number.isFinite(head.y))boardEl.appendChild(el("circle",{cx:head.x*C+C/2,cy:head.y*C+C/2,r:C*0.24,fill:"#bbf7d0"}));
  const status=frame.alive===false?"CRASH":frame.score!==undefined?"FINISHED":"RUNNING";
  hudEl.textContent=`${status} food=${frame.food_eaten||0} alive=${frame.alive!==false} invalid=${frame.invalid_moves||0} score=${frame.score??"-"}`;
}
window.addEventListener("message",e=>{const m=e.data;if(!m||typeof m!=="object")return;if(m.type==="agp.renderer.state")draw(m.payload?.frame||{});});
draw({board:Array.from({length:12},()=>Array(12).fill(0)),head:{x:3,y:3},food_eaten:0,alive:true});
window.parent.postMessage({type:"agp.renderer.ready",payload:{version:"1.0.0"}},"*");
</script>
</body>
</html>
