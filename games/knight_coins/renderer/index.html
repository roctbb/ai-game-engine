<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7fb; color: #172033; }
    .wrap { padding: 16px; }
    .grid { display: grid; gap: 3px; width: min(82vmin, 520px); }
    .cell { position: relative; aspect-ratio: 1; border-radius: 5px; display: grid; place-items: center; font-weight: 800; }
    .wall { background: #263238; }
    .empty { background: #ffffff; }
    .coin { background: #f9c74f; }
    .exit { background: #90be6d; }
    .player { outline: 4px solid #3a0ca3; outline-offset: -4px; }
    .stats { margin-top: 12px; font-size: 14px; }
      .cell[data-badge]::after { content: attr(data-badge); position: absolute; right: -7px; top: -7px; min-width: 18px; height: 18px; padding: 0 3px; display: grid; place-items: center; border-radius: 999px; background: #111827; color: #fff; border: 2px solid #fff; font-size: 11px; line-height: 1; z-index: 3; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="board" class="grid"></div>
    <div id="stats" class="stats"></div>
  </div>
  <script>
    function render(payload) {
      const frame = (payload.frames || []).at(-1)?.frame || payload.frame || {};
      const board = Array.isArray(frame.board) ? frame.board : [];
      const width = frame.width || board.length || 1;
      const height = frame.height || board[0]?.length || 1;
      const rows = Array.from({ length: height }, (_, y) => Array.from({ length: width }, (_, x) => board[x]?.[y] ?? 0));
      const root = document.getElementById("board");
      root.style.gridTemplateColumns = `repeat(${width}, 1fr)`;
      const px = frame.position?.x;
      const py = frame.position?.y;
      root.innerHTML = "";
      rows.forEach((row, y) => row.forEach((cell, x) => {
        const el = document.createElement("div");
        el.className = "cell " + (cell === -1 ? "wall" : cell === 1 ? "coin" : cell === 2 ? "exit" : "empty");
        if (x === px && y === py) { el.classList.add("player"); el.dataset.badge = String(frame.coins_collected || 0); }
        el.textContent = cell === 1 ? "●" : cell === 2 ? "↥" : "";
        root.appendChild(el);
      }));
      document.getElementById("stats").textContent = `Монеты: ${frame.coins_collected || 0} · Ошибки: ${frame.invalid_moves || 0} · Выход: ${frame.escaped ? "да" : "нет"}`;
    }
    window.render = render;
    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object") return;
      if (message.type === "agp.renderer.state") render(message.payload || {});
    });
    render({ frame: { board: Array.from({ length: 8 }, () => Array(8).fill(0)), position: { x: 0, y: 0 } } });
    window.parent.postMessage({ type: "agp.renderer.ready", payload: { version: "1.0.0" } }, "*");
  </script>
</body>
</html>
