<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tower Defense Renderer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f7ff;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1f2e46;
    }
    .wrap { width: min(720px, 96vw); }
    .board {
      background: #fff;
      border: 1px solid #c5d3ea;
      border-radius: 12px;
      overflow: hidden;
    }
    .status { margin-top: 10px; font-size: 13px; color: #3b506f; }
    .details { margin-top: 4px; font-size: 12px; color: #607796; min-height: 16px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg id="board" class="board" viewBox="0 0 952 300" role="img" aria-label="Tower defense board"></svg>
    <div class="status" id="status">Renderer: initializing</div>
    <div class="details mono" id="details"></div>
  </div>
  <script>
    const LANES = 3;
    const DEFAULT_TRACK = 14;
    const LEFT = 50;
    const TOP = 40;
    const LANE_H = 70;
    const CELL_W = 58;

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");

    let runId = "";

    function setStatus(text, details) {
      statusEl.textContent = text;
      detailsEl.textContent = details || "";
    }

    function svg(tag) {
      return document.createElementNS("http://www.w3.org/2000/svg", tag);
    }

    function draw(frame) {
      boardEl.replaceChildren();
      const towers = Array.isArray(frame?.towers) ? frame.towers : [0, 0, 0];
      const enemies = Array.isArray(frame?.enemies) ? frame.enemies : [];
      const baseHp = Number.isFinite(frame?.base_hp) ? frame.base_hp : "-";
      const baseHpMax = Number.isFinite(frame?.base_hp_max) ? frame.base_hp_max : 45;
      const budget = Number.isFinite(frame?.budget) ? frame.budget : "-";
      const trackLength = Number.isFinite(frame?.track_length) ? frame.track_length : DEFAULT_TRACK;
      const boardWidth = LEFT + trackLength * CELL_W + 90;

      const bg = svg("rect");
      boardEl.setAttribute("viewBox", `0 0 ${boardWidth} 300`);
      bg.setAttribute("x", "0");
      bg.setAttribute("y", "0");
      bg.setAttribute("width", String(boardWidth));
      bg.setAttribute("height", "300");
      bg.setAttribute("fill", "#f8fbff");
      boardEl.appendChild(bg);

      for (let lane = 0; lane < LANES; lane += 1) {
        const y = TOP + lane * LANE_H;
        const laneRect = svg("rect");
        laneRect.setAttribute("x", String(LEFT));
        laneRect.setAttribute("y", String(y));
        laneRect.setAttribute("width", String(trackLength * CELL_W));
        laneRect.setAttribute("height", "46");
        laneRect.setAttribute("rx", "8");
        laneRect.setAttribute("fill", "#ecf2fe");
        laneRect.setAttribute("stroke", "#d2dff4");
        boardEl.appendChild(laneRect);

        const label = svg("text");
        label.setAttribute("x", "18");
        label.setAttribute("y", String(y + 29));
        label.setAttribute("font-size", "13");
        label.setAttribute("fill", "#607796");
        label.textContent = `lane ${lane}`;
        boardEl.appendChild(label);

        for (let cell = 0; cell <= trackLength; cell += 1) {
          const marker = svg("line");
          marker.setAttribute("x1", String(LEFT + cell * CELL_W));
          marker.setAttribute("x2", String(LEFT + cell * CELL_W));
          marker.setAttribute("y1", String(y));
          marker.setAttribute("y2", String(y + 46));
          marker.setAttribute("stroke", "#dbe7f8");
          marker.setAttribute("stroke-width", "1");
          boardEl.appendChild(marker);
        }

        const towerCount = Number.isFinite(towers[lane]) ? towers[lane] : 0;
        for (let t = 0; t < towerCount; t += 1) {
          const tower = svg("g");
          const tx = LEFT + 18 + t * 18;
          const range = svg("circle");
          range.setAttribute("cx", String(tx));
          range.setAttribute("cy", String(y + 23));
          range.setAttribute("r", "28");
          range.setAttribute("fill", "#bfdbfe");
          range.setAttribute("opacity", "0.22");
          const base = svg("rect");
          base.setAttribute("x", String(tx - 8));
          base.setAttribute("y", String(y + 13));
          base.setAttribute("width", "16");
          base.setAttribute("height", "20");
          base.setAttribute("rx", "4");
          base.setAttribute("fill", "#2563eb");
          const barrel = svg("line");
          barrel.setAttribute("x1", String(tx));
          barrel.setAttribute("x2", String(tx + 18));
          barrel.setAttribute("y1", String(y + 18));
          barrel.setAttribute("y2", String(y + 18));
          barrel.setAttribute("stroke", "#1e3a8a");
          barrel.setAttribute("stroke-width", "4");
          tower.appendChild(range);
          tower.appendChild(base);
          tower.appendChild(barrel);
          boardEl.appendChild(tower);
        }

        const baseGate = svg("rect");
        baseGate.setAttribute("x", String(LEFT + trackLength * CELL_W + 12));
        baseGate.setAttribute("y", String(y + 3));
        baseGate.setAttribute("width", "28");
        baseGate.setAttribute("height", "40");
        baseGate.setAttribute("rx", "6");
        baseGate.setAttribute("fill", baseHp === "-" || baseHp > 10 ? "#22c55e" : "#ef4444");
        boardEl.appendChild(baseGate);

        if (baseHp !== "-") {
          const hpPct = Math.max(0, Math.min(1, baseHp / baseHpMax));
          const hpBg = svg("rect");
          hpBg.setAttribute("x", String(LEFT + trackLength * CELL_W + 18));
          hpBg.setAttribute("y", String(y + 8));
          hpBg.setAttribute("width", "16");
          hpBg.setAttribute("height", "30");
          hpBg.setAttribute("rx", "4");
          hpBg.setAttribute("fill", "rgba(15, 23, 42, 0.5)");
          boardEl.appendChild(hpBg);

          const hpFill = svg("rect");
          hpFill.setAttribute("x", String(LEFT + trackLength * CELL_W + 18));
          hpFill.setAttribute("y", String(y + 8 + 30 * (1 - hpPct)));
          hpFill.setAttribute("width", "16");
          hpFill.setAttribute("height", String(30 * hpPct));
          hpFill.setAttribute("rx", "4");
          hpFill.setAttribute("fill", hpPct < 0.3 ? "#fecaca" : "#bbf7d0");
          boardEl.appendChild(hpFill);
        }
      }

      for (const enemy of enemies) {
        if (!enemy || typeof enemy !== "object") continue;
        const lane = Number.isFinite(enemy.lane) ? enemy.lane : 0;
        const position = Number.isFinite(enemy.position) ? enemy.position : 0;
        const hp = Number.isFinite(enemy.hp) ? enemy.hp : 0;
        const ex = LEFT + position * CELL_W + 26;
        const ey = TOP + lane * LANE_H + 23;
        const dot = svg("circle");
        dot.setAttribute("cx", String(ex));
        dot.setAttribute("cy", String(ey));
        dot.setAttribute("r", "10");
        dot.setAttribute("fill", "#ef4444");
        boardEl.appendChild(dot);

        const hpBar = svg("rect");
        hpBar.setAttribute("x", String(ex - 14));
        hpBar.setAttribute("y", String(ey - 22));
        hpBar.setAttribute("width", String(Math.max(3, Math.min(28, hp * 5))));
        hpBar.setAttribute("height", "4");
        hpBar.setAttribute("fill", "#dc2626");
        boardEl.appendChild(hpBar);

        const hpText = svg("text");
        hpText.setAttribute("x", String(ex - 5));
        hpText.setAttribute("y", String(ey + 4));
        hpText.setAttribute("fill", "#fff");
        hpText.setAttribute("font-size", "10");
        hpText.textContent = String(hp);
        boardEl.appendChild(hpText);
      }

      const info = svg("text");
      info.setAttribute("x", "20");
      info.setAttribute("y", "24");
      info.setAttribute("fill", "#1f2e46");
      info.setAttribute("font-size", "13");
      info.textContent = `base_hp=${baseHp} budget=${budget} enemies=${enemies.length}`;
      boardEl.appendChild(info);

      const legend = svg("text");
      legend.setAttribute("x", "20");
      legend.setAttribute("y", "282");
      legend.setAttribute("fill", "#607796");
      legend.setAttribute("font-size", "12");
      legend.textContent = "blue=towers, red=enemies, green/red gate=base, pale circles=tower range";
      boardEl.appendChild(legend);
    }

    function onState(payload) {
      const tick = Number.isFinite(payload?.tick) ? payload.tick : "-";
      const phase = typeof payload?.phase === "string" ? payload.phase : "unknown";
      const frame = payload && typeof payload.frame === "object" ? payload.frame : {};
      draw(frame);
      setStatus(`Renderer: state update (${phase})`, `run_id=${runId || "-"} tick=${tick}`);
    }

    function onResult(payload) {
      const status = typeof payload?.status === "string" ? payload.status : "finished";
      const metrics = payload && typeof payload.metrics === "object" ? payload.metrics : {};
      const score = Number.isFinite(metrics.score) ? metrics.score : "-";
      setStatus("Renderer: result received", `run_id=${runId || "-"} status=${status} score=${score}`);
    }

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object" || typeof message.type !== "string") return;
      if (message.type === "agp.renderer.init") {
        runId = message.payload && message.payload.runId ? String(message.payload.runId) : "";
        setStatus("Renderer: init received", runId ? `run_id=${runId}` : "");
      } else if (message.type === "agp.renderer.state") {
        onState(message.payload || {});
      } else if (message.type === "agp.renderer.result") {
        onResult(message.payload || {});
      }
    });

    draw({ towers: [0, 0, 0], enemies: [], base_hp: 45, base_hp_max: 45, budget: 18, track_length: 14 });
    window.parent.postMessage({ type: "agp.renderer.ready", payload: { version: "1.1.0" } }, "*");
    setStatus("Renderer: ready");
  </script>
</body>
</html>
