<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Template v2 renderer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f2f6fc;
      color: #1d2a3b;
    }
    .card { width: min(760px, 96vw); }
    .board { background: #fff; border: 1px solid #c9d8ec; border-radius: 12px; overflow: hidden; }
    .status { margin-top: 8px; font-size: 13px; color: #3e5878; }
    .details { margin-top: 4px; font-size: 12px; color: #607796; min-height: 16px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div class="card">
    <svg id="board" class="board" viewBox="0 0 760 280" role="img" aria-label="Template board"></svg>
    <div class="status" id="status">Renderer: initializing</div>
    <div class="details mono" id="details"></div>
  </div>
  <script>
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");

    let runId = "";

    function setStatus(text, details) {
      statusEl.textContent = text;
      detailsEl.textContent = details || "";
    }

    function svg(tag) {
      return document.createElementNS("http://www.w3.org/2000/svg", tag);
    }

    function draw(frame) {
      boardEl.replaceChildren();
      const turn = Number.isFinite(frame?.turn) ? frame.turn : 0;
      const value = Number.isFinite(frame?.value) ? frame.value : 0;
      const action = typeof frame?.action === "string" ? frame.action : "-";

      const bg = svg("rect");
      bg.setAttribute("x", "0");
      bg.setAttribute("y", "0");
      bg.setAttribute("width", "760");
      bg.setAttribute("height", "280");
      bg.setAttribute("fill", "#f8fbff");
      boardEl.appendChild(bg);

      const axis = svg("line");
      axis.setAttribute("x1", "80");
      axis.setAttribute("y1", "200");
      axis.setAttribute("x2", "680");
      axis.setAttribute("y2", "200");
      axis.setAttribute("stroke", "#cad7ea");
      axis.setAttribute("stroke-width", "2");
      boardEl.appendChild(axis);

      const bar = svg("rect");
      const clamped = Math.max(-50, Math.min(50, value));
      const width = Math.abs(clamped) * 5;
      bar.setAttribute("x", String(clamped >= 0 ? 380 : 380 - width));
      bar.setAttribute("y", "150");
      bar.setAttribute("width", String(width));
      bar.setAttribute("height", "36");
      bar.setAttribute("rx", "6");
      bar.setAttribute("fill", clamped >= 0 ? "#2563eb" : "#ef4444");
      boardEl.appendChild(bar);

      const text = svg("text");
      text.setAttribute("x", "20");
      text.setAttribute("y", "34");
      text.setAttribute("font-size", "16");
      text.setAttribute("fill", "#1d2a3b");
      text.textContent = `turn=${turn} value=${value} action=${action}`;
      boardEl.appendChild(text);
    }

    function onState(payload) {
      const tick = Number.isFinite(payload?.tick) ? payload.tick : "-";
      const phase = typeof payload?.phase === "string" ? payload.phase : "unknown";
      const frame = payload && typeof payload.frame === "object" ? payload.frame : {};
      draw(frame);
      setStatus(`Renderer: state update (${phase})`, `run_id=${runId || "-"} tick=${tick}`);
    }

    function onResult(payload) {
      const status = typeof payload?.status === "string" ? payload.status : "finished";
      const metrics = payload && typeof payload.metrics === "object" ? payload.metrics : {};
      const finalValue = Number.isFinite(metrics.final_value) ? metrics.final_value : "-";
      setStatus("Renderer: result received", `run_id=${runId || "-"} status=${status} final_value=${finalValue}`);
    }

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object" || typeof message.type !== "string") return;
      if (message.type === "agp.renderer.init") {
        runId = message.payload && message.payload.runId ? String(message.payload.runId) : "";
        setStatus("Renderer: init received", runId ? `run_id=${runId}` : "");
      } else if (message.type === "agp.renderer.state") {
        onState(message.payload || {});
      } else if (message.type === "agp.renderer.result") {
        onResult(message.payload || {});
      }
    });

    draw({ turn: 0, value: 0, action: "init" });
    window.parent.postMessage({ type: "agp.renderer.ready", payload: { version: "1.1.0" } }, "*");
    setStatus("Renderer: ready");
  </script>
</body>
</html>
