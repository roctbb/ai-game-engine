id: tanks_ctf_v1
title: Танки
game_mode: multiplayer
min_players_per_match: 2
max_players_per_match: 16
semver: 1.1.0
code_api_mode: turn_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: |
  Слот driver: напишите функцию make_choice(x, y, map_state), которая возвращает действие
  go_up/go_down/go_left/go_right, fire_up/fire_down/fire_left/fire_right или use HealthKit/use SniperBooster.
  Для совместимости также принимаются up/down/left/right как обычное движение.
  Слот support (опционально): напишите функцию make_support(state), которая возвращает "boost" или "none".
description: "Большая танковая арена со старой графикой: танки ездят по карте, собирают предметы, стреляют по башням и разрушаемым объектам."
difficulty: hard
learning_section: Соревновательные стратегии
topics:
  - мультиагентные системы
  - координация команд
slots:
  - key: driver
    title: Логика движения
    required: true
  - key: support
    title: Логика поддержки
    required: false
demo_strategies:
  - id: coin_shooter
    slot_key: driver
    title: "Демо: монеты и стрельба"
    language: python
    path: examples/coin_shooter.py
    description: Ищет монеты и стреляет по видимым целям.
  - id: boost_support
    slot_key: support
    title: "Демо: ускорение"
    language: python
    path: examples/support_boost.py
    description: Включает короткое ускорение, когда cooldown готов.
