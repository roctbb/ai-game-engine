id: capture_flag_v1
title: Захват флага
game_mode: multiplayer
min_players_per_match: 2
max_players_per_match: 4
semver: 2.1.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, has_flag), возвращающую
  up/down/left/right/stay, shoot_* или build_*. Захватите общий флаг и принесите
  его на свою базу.
description: От 2 до 4 участников охотятся за одним общим флагом, строят временные
  стены и сбивают носителя флага выстрелами.
difficulty: medium
learning_section: Соревновательные стратегии
topics:
- графы
- BFS
- игровые стратегии
- управление ресурсами
slots:
- key: player
  title: Игрок
  required: true
demo_strategies:
- id: demo_strategy
  slot_key: player
  title: 'Демо: базовая стратегия'
  language: python
  path: examples/demo.py
  description: Идет к общему флагу, возвращается на свою базу и стреляет по носителю
    флага на прямой линии.
