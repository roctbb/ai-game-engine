id: capture_flag_v1
title: Захват флага
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, has_flag), возвращающую up/down/left/right/stay. Заберите флаг соперника и вернитесь на свою базу.
description: Два участника играют в захват флага на случайной карте со стенами.
difficulty: medium
topics:
  - графы
  - BFS
  - игровые стратегии
slots:
  - key: red
    title: Красный игрок
    required: true
  - key: blue
    title: Синий игрок
    required: true
demo_strategies:
  - id: red_bfs
    slot_key: red
    title: "Демо: красный BFS"
    language: python
    path: examples/red_bfs.py
    description: Идет к флагу соперника, затем возвращается на свою базу.
  - id: blue_bfs
    slot_key: blue
    title: "Демо: синий BFS"
    language: python
    path: examples/blue_bfs.py
    description: Идет к флагу соперника с другим порядком обхода соседей.
