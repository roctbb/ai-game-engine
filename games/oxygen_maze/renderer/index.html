<!doctype html>
<html lang="ru"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Oxygen Maze Renderer</title>
<style>body{margin:0;width:100vw;height:100vh;display:grid;place-items:center;background:#111827;color:#e5edf5;font-family:Arial,sans-serif}.wrap{width:min(92vmin,760px)}svg{width:100%;aspect-ratio:1/1;background:#f8fafc;border:1px solid #334155}.hud{margin-top:8px;font:13px ui-monospace,monospace;color:#cbd5e1}</style></head>
<body><div class="wrap"><svg id="board"></svg><div id="hud" class="hud"></div></div><script>
const SVG="http://www.w3.org/2000/svg",boardEl=document.getElementById("board"),hudEl=document.getElementById("hud");function el(t,a){const e=document.createElementNS(SVG,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));return e}
function drawMiniBadge(cx,cy,C,text,fill="#0f172a"){if(text===undefined||text===null||text===""||text===false)return;const label=String(text).slice(0,3),r=Math.max(5,C*0.18),g=el("g",{}),bx=cx+C*0.28,by=cy-C*0.28;g.appendChild(el("circle",{cx:bx,cy:by,r,fill,stroke:"#ffffff","stroke-width":Math.max(1,C*0.045)}));const t=el("text",{x:bx,y:by+C*0.045,"text-anchor":"middle","dominant-baseline":"middle","font-size":Math.max(8,C*0.23),"font-weight":800,fill:"#ffffff"});t.textContent=label;g.appendChild(t);boardEl.appendChild(g)}
function drawMiniBar(cx,cy,C,value,max,fill="#22c55e"){const m=Number(max),v=Number(value);if(!Number.isFinite(m)||m<=0||!Number.isFinite(v))return;const pct=Math.max(0,Math.min(1,v/m)),w=C*0.7,h=Math.max(3,C*0.09),x=cx-w/2,y=cy+C*0.36;boardEl.appendChild(el("rect",{x,y,width:w,height:h,rx:h/2,fill:"rgba(15,23,42,.62)"}));boardEl.appendChild(el("rect",{x,y,width:w*pct,height:h,rx:h/2,fill:pct<.25?"#ef4444":fill}))}
function draw(frame){const grid=Array.isArray(frame.board)?frame.board:[],w=grid.length||24,h=Array.isArray(grid[0])?grid[0].length:20,C=32;boardEl.setAttribute("viewBox",`0 0 ${w*C} ${h*C}`);boardEl.replaceChildren();for(let y=0;y<h;y++)for(let x=0;x<w;x++){const v=grid[x]?.[y]??0;boardEl.appendChild(el("rect",{x:x*C,y:y*C,width:C-1,height:C-1,fill:v===-1?"#334155":v===1?"#dbeafe":v===2?"#dcfce7":"#f8fafc"}));if(v===1||v===2){const t=el("text",{x:x*C+C/2,y:y*C+C*0.66,"text-anchor":"middle","font-size":18,fill:v===1?"#2563eb":"#15803d"});t.textContent=v===1?"O":"E";boardEl.appendChild(t)}}const p=frame.position||{};if(Number.isFinite(p.x)&&Number.isFinite(p.y)){const cx=p.x*C+C/2,cy=p.y*C+C/2;boardEl.appendChild(el("circle",{cx,cy,r:C*0.3,fill:frame.alive===false?"#ef4444":"#f97316"}));drawMiniBar(cx,cy,C,frame.oxygen,frame.oxygen_max??28,"#38bdf8");drawMiniBadge(cx,cy,C,frame.refills||0,"#0369a1")}const max=frame.oxygen_max??28,oxygen=frame.oxygen??0,pct=Math.max(0,Math.min(100,Math.round(oxygen*100/max)));hudEl.innerHTML=`<div style="height:10px;background:#334155;border-radius:6px;overflow:hidden;margin-bottom:6px"><span style="display:block;height:100%;width:${pct}%;background:${pct<25?"#ef4444":"#38bdf8"}"></span></div>oxygen=${oxygen}/${max} refills=${frame.refills||0} escaped=${frame.escaped===true} score=${frame.score??"-"}`;}
window.addEventListener("message",e=>{const m=e.data;if(!m||typeof m!=="object")return;if(m.type==="agp.renderer.state")draw(m.payload?.frame||{});});draw({board:Array.from({length:24},()=>Array(20).fill(0)),position:{x:1,y:1},oxygen:28,oxygen_max:28,alive:true});window.parent.postMessage({type:"agp.renderer.ready",payload:{version:"1.0.0"}},"*");
</script></body></html>
