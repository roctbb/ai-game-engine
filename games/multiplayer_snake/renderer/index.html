<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake Renderer</title>
  <style>
    body{margin:0;width:100vw;height:100vh;display:grid;place-items:center;background:#0c1220;color:#dbeafe;font-family:Arial,sans-serif}
    .wrap{width:min(92vmin,780px)}
    svg{width:100%;aspect-ratio:1/1;background:#0f172a;border:1px solid #29415e}
    .hud{margin-top:8px;font:12px ui-monospace,monospace;color:#b6c7da}
  </style>
</head>
<body>
<div class="wrap"><svg id="board"></svg><div id="hud" class="hud"></div></div>
<script>
const SVG="http://www.w3.org/2000/svg", boardEl=document.getElementById("board"), hudEl=document.getElementById("hud");
const colors={snake_1:"#22c55e",snake_2:"#38bdf8"};
function el(t,a){const e=document.createElementNS(SVG,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));return e}
function drawMiniBadge(cx,cy,C,text,fill="#0f172a"){if(text===undefined||text===null||text===""||text===false)return;const label=String(text).slice(0,3),r=Math.max(5,C*0.18),g=el("g",{}),bx=cx+C*0.28,by=cy-C*0.28;g.appendChild(el("circle",{cx:bx,cy:by,r,fill,stroke:"#ffffff","stroke-width":Math.max(1,C*0.045)}));const t=el("text",{x:bx,y:by+C*0.045,"text-anchor":"middle","dominant-baseline":"middle","font-size":Math.max(8,C*0.23),"font-weight":800,fill:"#ffffff"});t.textContent=label;g.appendChild(t);boardEl.appendChild(g)}
function draw(frame){
  const w=frame.width||14,h=frame.height||14,C=30; boardEl.setAttribute("viewBox",`0 0 ${w*C} ${h*C}`); boardEl.replaceChildren();
  boardEl.appendChild(el("rect",{x:0,y:0,width:w*C,height:h*C,fill:"#0f172a"}));
  for(let y=0;y<h;y++)for(let x=0;x<w;x++)boardEl.appendChild(el("rect",{x:x*C,y:y*C,width:C-1,height:C-1,fill:"#17233a"}));
  const food=frame.food;if(food)boardEl.appendChild(el("circle",{cx:food.x*C+C/2,cy:food.y*C+C/2,r:C*0.28,fill:"#ef4444"}));
  const snakes=frame.snakes||{};
  for(const [slot,snake] of Object.entries(snakes)){
    const color=colors[slot]||"#ddd", body=Array.isArray(snake.body)?snake.body:[];
    for(let i=body.length-1;i>=0;i--){const p=body[i];boardEl.appendChild(el(i===0?"circle":"rect",i===0?{cx:p.x*C+C/2,cy:p.y*C+C/2,r:C*0.32,fill:color,opacity:snake.alive?1:0.35}:{x:p.x*C+4,y:p.y*C+4,width:C-8,height:C-8,rx:5,fill:color,opacity:snake.alive?0.8:0.25}));if(i===0)drawMiniBadge(p.x*C+C/2,p.y*C+C/2,C,snake.food_eaten||0,color)}
  }
  const scores=frame.slot_scores||{};
  hudEl.textContent=Object.entries(snakes).map(([slot,s])=>`${slot}: food=${s.food_eaten||0} alive=${s.alive!==false} score=${scores[slot]??"-"}`).join(" | ");
}
window.addEventListener("message",e=>{const m=e.data;if(!m||typeof m!=="object")return;if(m.type==="agp.renderer.state")draw(m.payload?.frame||{});});
draw({width:14,height:14,snakes:{},food:{x:6,y:6}});
window.parent.postMessage({type:"agp.renderer.ready",payload:{version:"1.0.0"}},"*");
</script>
</body>
</html>
