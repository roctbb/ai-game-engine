id: multiplayer_snake_v1
title: Командная змейка
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Заполните код для каждой роли snake_1..snake_4. В каждой роли определите make_move(x, y, board), возвращающую up/down/left/right.
description: Управляйте отрядом из четырех змеек на общей карте. Итоговый счет игрока — сумма очков всех ролей.
difficulty: medium
topics:
  - матрицы
  - игровые стратегии
  - одновременные ходы
