id: ice_treasure_duel_v1
title: Ледяной клад
game_mode: small_match
semver: 1.0.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, score), возвращающую up/down/left/right/stay. На льду игрок скользит до стены.
description: Два игрока соревнуются на случайном ледяном поле и собирают кристаллы, планируя движение до следующей остановки.
difficulty: medium
learning_section: Поиск пути BFS
topics:
  - BFS
  - симуляция движения
  - соревнование
slots:
  - key: ruby
    title: Рубиновый игрок
    required: true
  - key: sapphire
    title: Сапфировый игрок
    required: true
demo_strategies:
  - id: ruby_slider
    slot_key: ruby
    title: "Демо: BFS до кристалла"
    language: python
    path: examples/ruby_slider.py
    description: Ищет ближайший кристалл с учетом скольжения по льду.
  - id: sapphire_slider
    slot_key: sapphire
    title: "Демо: BFS до кристалла"
    language: python
    path: examples/sapphire_slider.py
    description: Ищет ближайший кристалл с учетом скольжения по льду.
