id: ice_treasure_duel_v1
title: Ледяной клад
game_mode: multiplayer
min_players_per_match: 2
max_players_per_match: 2
semver: 1.1.0
code_api_mode: script_based
engine_entrypoint: engine.py
renderer_entrypoint: renderer/index.html
player_instruction: Определите функцию make_move(x, y, board, score), возвращающую
  up/down/left/right/stay. На льду игрок скользит до стены.
description: Два игрока соревнуются на случайном ледяном поле и собирают кристаллы,
  планируя движение до следующей остановки.
difficulty: medium
learning_section: Поиск пути BFS
topics:
- BFS
- симуляция движения
- соревнование
slots:
- key: player
  title: Игрок
  required: true
demo_strategies:
- id: demo_strategy
  slot_key: player
  title: 'Демо: базовая стратегия'
  language: python
  path: examples/demo.py
  description: Ищет ближайший кристалл с учетом скольжения по льду.
